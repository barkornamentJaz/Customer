<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Detail · Bark Ornament CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0F2A47; --steel: #2E6096; --border: #E3E7ED; --muted: #6B7280; --text: #1F2937;
    --font-body: 'Inter', sans-serif; --font-head: 'Sora', 'Inter', sans-serif;
  }
  * { box-sizing: border-box; }
  body { font-family: var(--font-body); color: var(--text); margin: 0; background: #F4F6F9; }
  .sheet { max-width: 780px; margin: 30px auto; background: #fff; padding: 48px; border-radius: 10px; box-shadow: 0 1px 2px rgba(20,33,61,.06), 0 4px 16px rgba(20,33,61,.06); }
  .doc-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid var(--ink); padding-bottom: 20px; margin-bottom: 28px; }
  .doc-header .company { font-family: var(--font-head); font-weight: 700; font-size: 20px; color: var(--ink); }
  .doc-header .address { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .doc-title { text-align: right; }
  .doc-title h1 { font-family: var(--font-head); font-size: 18px; margin: 0; color: var(--ink); }
  .doc-title .serial { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
  .section-title { font-family: var(--font-head); font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--steel); font-weight: 700; margin: 26px 0 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 28px; }
  .row { border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .row .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .02em; }
  .row .value { font-size: 14.5px; font-weight: 600; margin-top: 3px; }
  .status-pill { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12.5px; font-weight: 700; background: #E4EDF6; color: #1F4670; }
  .actions { text-align: center; margin: 24px auto; max-width: 780px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--ink); font-weight: 600; cursor: pointer; text-decoration: none; font-size: 13.5px; }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .footer-note { text-align: center; font-size: 11.5px; color: var(--muted); margin-top: 30px; }
  @media print {
    .no-print { display: none !important; }
    body { background: #fff; }
    .sheet { box-shadow: none; margin: 0; max-width: 100%; }
  }
</style>
</head>
<body>

<div class="actions no-print">
  <a href="customers.html" class="btn">&larr; Back to Customers</a>
  <button class="btn primary" onclick="window.print()">Print / Save as PDF</button>
</div>

<div class="sheet" id="sheet">
  <div class="loading-row" style="text-align:center;padding:60px;color:#6B7280;">Loading customer…</div>
</div>

<script>
/**
 * Paste your deployed Google Apps Script Web App URL below.
 * Deploy > New deployment > Web app > Execute as: Me > Who has access: Anyone
 * The URL ends with /exec
 */
const API_URL = 'https://script.google.com/macros/s/AKfycbxFb-wqcSjnSsP_jPqv_6B1FG912MRO7G2keSJCSgGB6_-n4kQ3SU7OPBpGM7gqr1g/exec';

const COMPANY = {
  name: 'Bark Ornament Private Limited',
  address: 'No. 59A Bekkegama, Panadura'
};

const STATUS_OPTIONS = [
  'New Lead',
  'Existing Customer'
];

// Order reflects the sales pipeline, used for the funnel visual on the dashboard.
const STATUS_PIPELINE_ORDER = [
  'New Lead',
  'Existing Customer'
];

const STATUS_COLORS = {
  'New Lead': '#94A3B8',
  'Existing Customer': '#10B981'
};


/* ============================================================
   Bark Ornament — Customer Management System
   Shared utilities: navigation shell, API calls, helpers
   ============================================================ */

/* ---------- Navigation shell ---------- */

function renderShell(activePage) {
  const nav = [
    { key: 'dashboard', label: 'Dashboard', href: 'index.html', icon: 'grid' },
    { key: 'register', label: 'Add Customer', href: 'register.html', icon: 'plus' },
    { key: 'customers', label: 'Customers', href: 'customers.html', icon: 'list' }
  ];

  const icons = {
    grid: '<path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>',
    plus: '<path d="M12 5v14M5 12h14"/>',
    list: '<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>'
  };

  const navHtml = nav.map(function (item) {
    const active = item.key === activePage ? ' active' : '';
    return '<a class="nav-link' + active + '" href="' + item.href + '">' +
      '<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + icons[item.icon] + '</svg>' +
      '<span>' + item.label + '</span></a>';
  }).join('');

  const shell = document.getElementById('app-shell');
  shell.innerHTML =
    '<aside class="sidebar">' +
    '  <div class="brand">' +
    '    <div class="brand-mark">BO</div>' +
    '    <div class="brand-text">' +
    '      <div class="brand-name">Bark Ornament</div>' +
    '      <div class="brand-sub">Customer Management</div>' +
    '    </div>' +
    '  </div>' +
    '  <nav class="nav">' + navHtml + '</nav>' +
    '  <div class="sidebar-footer">' + COMPANY.name + '<br>' + COMPANY.address + '</div>' +
    '</aside>' +
    '<div class="mobile-topbar">' +
    '  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">' +
    '    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>' +
    '  </button>' +
    '  <span class="brand-name">Bark Ornament</span>' +
    '</div>' +
    '<main class="main" id="main-content"></main>';

  const toggle = document.getElementById('menuToggle');
  if (toggle) {
    toggle.addEventListener('click', function () {
      document.querySelector('.sidebar').classList.toggle('open');
    });
  }
}

/* ---------- Toast notifications ---------- */

function showToast(message, type) {
  type = type || 'info';
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(function () { toast.classList.add('show'); });
  setTimeout(function () {
    toast.classList.remove('show');
    setTimeout(function () { toast.remove(); }, 300);
  }, 3200);
}

/* ---------- API layer ---------- */

const Api = {
  async getCustomers() {
    if (!API_URL || API_URL.indexOf('PASTE_YOUR') === 0) {
      throw new Error('API_URL is not configured. Edit js/config.js with your Apps Script deployment URL.');
    }
    const res = await fetch(API_URL, { method: 'GET' });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Failed to load customers');
    return json.data;
  },

  async addCustomer(data) {
    return this._post({ action: 'add', data: data });
  },

  async updateCustomer(data) {
    return this._post({ action: 'update', data: data });
  },

  async deleteCustomer(serialNo) {
    return this._post({ action: 'delete', serialNo: serialNo });
  },

  async _post(body) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');
    return json.data;
  }
};

/* ---------- Formatting helpers ---------- */

function formatCurrency(value, currency) {
  const num = Number(value) || 0;
  return (currency || 'USD') + ' ' + num.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function formatDate(value) {
  if (!value) return '—';
  const d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function statusBadge(status) {
  const color = STATUS_COLORS[status] || '#9CA3AF';
  return '<span class="status-badge" style="--badge-color:' + color + '">' +
    '<span class="status-dot"></span>' + status + '</span>';
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ---------- Simple client-side cache shared across pages in one session ---------- */

const CustomerStore = {
  _data: null,
  async load(force) {
    if (this._data && !force) return this._data;
    this._data = await Api.getCustomers();
    return this._data;
  },
  invalidate() { this._data = null; }
};

</script>
<script>
const params = new URLSearchParams(window.location.search);
const serialNo = params.get('id');

function row(label, value) {
  return '<div class="row"><div class="label">' + label + '</div><div class="value">' + (value || '—') + '</div></div>';
}

async function load() {
  const sheetEl = document.getElementById('sheet');
  if (!serialNo) {
    sheetEl.innerHTML = '<p>No customer specified.</p>';
    return;
  }
  try {
    const customers = await CustomerStore.load();
    const c = customers.find(x => x.serialNo === serialNo);
    if (!c) {
      sheetEl.innerHTML = '<p>Customer not found.</p>';
      return;
    }

    sheetEl.innerHTML =
      '<div class="doc-header">' +
      '  <div><div class="company">' + escapeHtml(COMPANY.name) + '</div><div class="address">' + escapeHtml(COMPANY.address) + '</div></div>' +
      '  <div class="doc-title"><h1>Customer Profile</h1><div class="serial">' + escapeHtml(c.serialNo) + '</div></div>' +
      '</div>' +

      '<div class="grid">' +
      row('Company / Customer Name', escapeHtml(c.companyName)) +
      row('Contact Person', escapeHtml(c.contactPerson)) +
      row('Country', escapeHtml(c.country)) +
      row('Nationality', escapeHtml(c.nationality)) +
      row('Industry', escapeHtml(c.industry)) +
      row('Status', '<span class="status-pill">' + escapeHtml(c.status) + '</span>') +
      row('Email Address', escapeHtml(c.email)) +
      row('Contact Number', escapeHtml(c.contactNumber)) +
      '</div>' +

      '<div class="section-title">Sales Information</div>' +
      '<div class="grid">' +
      row('Expected Sales Volume', formatCurrency(c.expectedSalesVolume)) +
      row('Current Sales Volume', formatCurrency(c.currentSalesVolume)) +
      row('Created Date', formatDate(c.createdDate)) +
      '</div>' +

      '<div class="footer-note">Generated on ' + formatDate(new Date()) + ' — ' + escapeHtml(COMPANY.name) + '</div>';
  } catch (err) {
    sheetEl.innerHTML = '<p style="color:#C0392B">Error loading customer: ' + escapeHtml(err.message) + '</p>';
  }
}

load();
</script>
</body>
</html>
