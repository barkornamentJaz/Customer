<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers · Bark Ornament CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">
<style>
/* ============================================================
   Bark Ornament — Customer Management System
   Design tokens
   ============================================================ */
:root {
  --ink: #0F2A47;          /* deep navy — sidebar / primary dark */
  --ink-light: #1B3A5C;    /* lighter navy for gradients/hover */
  --steel: #2E6096;        /* steel blue — links, secondary */
  --steel-dark: #1F4670;   /* steel blue hover/active state */
  --accent: #2E6096;       /* primary accent = steel blue (kept as alias for compatibility) */
  --accent-dark: #1F4670;
  --canvas: #F4F6F9;       /* page background */
  --card: #FFFFFF;
  --text: #1F2937;
  --muted: #6B7280;
  --border: #E3E7ED;
  --danger: #EF4444;
  --danger-dark: #C0392B;
  --success: #10B981;
  --radius: 10px;
  --shadow: 0 1px 2px rgba(20, 33, 61, 0.06), 0 4px 16px rgba(20, 33, 61, 0.06);
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-head: 'Sora', 'Inter', sans-serif;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--canvas);
  color: var(--text);
  font-size: 14.5px;
  line-height: 1.5;
}
h1, h2, h3, h4 { font-family: var(--font-head); margin: 0; color: var(--ink); }
a { color: var(--steel); text-decoration: none; }
button, input, select, textarea { font-family: inherit; font-size: inherit; }

/* ---------- App shell ---------- */
#app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px;
  background: var(--ink);
  color: #E7EBF3;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.brand-mark {
  width: 42px; height: 42px;
  border-radius: 50%;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
}
.brand-mark img { width: 100%; height: 100%; object-fit: cover; display: block; }
.brand-name { font-family: var(--font-head); font-weight: 600; font-size: 15px; color: #fff; }
.brand-sub { font-size: 11.5px; color: #9BA9C4; margin-top: 2px; }

.nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-link {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  color: #C4CDE0;
  font-size: 14px;
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
}
.nav-link:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-link.active { background: var(--steel); color: #fff; font-weight: 600; }
.nav-icon { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-footer {
  padding: 16px 20px 22px;
  font-size: 11px;
  color: #7C8AA8;
  border-top: 1px solid rgba(255,255,255,0.08);
  line-height: 1.5;
}

.mobile-topbar {
  display: none;
  align-items: center;
  gap: 12px;
  background: var(--ink);
  color: #fff;
  padding: 14px 16px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.menu-toggle { background: none; border: none; color: #fff; padding: 4px; cursor: pointer; }
.menu-toggle svg { width: 22px; height: 22px; }

.main {
  flex: 1;
  padding: 32px 36px;
  max-width: 1400px;
  width: 100%;
}

/* ---------- Page header ---------- */
.page-header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
.page-header h1 { font-size: 24px; }
.page-header p { color: var(--muted); margin: 6px 0 0; font-size: 13.5px; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  border-radius: 8px;
  border: 1px solid transparent;
  font-weight: 600;
  font-size: 13.5px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s, background 0.15s;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: #1d2f52; }
.btn-accent { background: var(--steel); color: #fff; }
.btn-accent:hover { background: var(--steel-dark); color: #fff; }
.btn-outline { background: #fff; color: var(--ink); border-color: var(--border); }
.btn-outline:hover { border-color: var(--steel); color: var(--steel); }
.btn-danger { background: #FDECEC; color: var(--danger-dark); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12.5px; }
.btn svg { width: 15px; height: 15px; }
.btn:disabled { opacity: 0.55; cursor: not-allowed; }

/* ---------- Cards ---------- */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 22px;
}

/* ---------- Dashboard stat grid ---------- */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 24px; }
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px 22px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.stat-card .stat-label { font-size: 12.5px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
.stat-card .stat-value { font-family: var(--font-head); font-size: 26px; font-weight: 700; color: var(--ink); margin-top: 8px; }
.stat-card .stat-accent { position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--steel); }

.dash-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
@media (max-width: 1080px) { .dash-grid { grid-template-columns: 1fr; } }

/* ---------- Pipeline funnel (signature element) ---------- */
.funnel { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
.funnel-row { display: grid; grid-template-columns: 130px 1fr 40px; align-items: center; gap: 12px; }
.funnel-label { font-size: 12.5px; font-weight: 600; color: var(--text); }
.funnel-track { height: 10px; background: var(--canvas); border-radius: 6px; overflow: hidden; }
.funnel-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
.funnel-count { font-size: 12.5px; font-weight: 700; color: var(--muted); text-align: right; }

/* ---------- Country summary list ---------- */
.country-list { display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto; }
.country-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 4px; border-bottom: 1px solid var(--border); font-size: 13.5px; }
.country-row:last-child { border-bottom: none; }
.country-count { background: var(--canvas); color: var(--ink); font-weight: 700; padding: 2px 10px; border-radius: 20px; font-size: 12px; }

/* ---------- Forms ---------- */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 20px; }
@media (max-width: 720px) { .form-grid { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: 1 / -1; }
.field label { font-size: 12.5px; font-weight: 600; color: var(--text); }
.field .hint { font-size: 11.5px; color: var(--muted); }
.field input, .field select {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus, .field select:focus {
  border-color: var(--steel);
  box-shadow: 0 0 0 3px rgba(58, 90, 140, 0.15);
}
.field input.invalid, .field select.invalid { border-color: var(--danger); }
.field .error-msg { font-size: 11.5px; color: var(--danger); min-height: 14px; }
.form-actions { display: flex; gap: 12px; margin-top: 22px; justify-content: flex-end; }

/* ---------- Table ---------- */
.table-toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
.search-box { position: relative; flex: 1; min-width: 220px; }
.search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); }
.search-box input { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid var(--border); border-radius: 8px; }
.table-toolbar select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; background: #fff; }

.table-wrap { position: relative; overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: #fff; }
.table-wrap::after {
  content: '';
  position: absolute; top: 0; right: 0; bottom: 0; width: 32px;
  background: linear-gradient(to right, transparent, rgba(15,42,71,0.08));
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
}
.table-wrap.has-more::after { opacity: 1; }
table.data-table { width: 100%; border-collapse: collapse; font-size: 13.3px; min-width: 900px; }
/* Keep Serial No and Actions visible while scrolling so nothing important gets hidden behind the scrollbar */
table.data-table th:first-child, table.data-table td:first-child {
  position: sticky; left: 0; background: #fff; z-index: 2; box-shadow: 2px 0 4px -2px rgba(20,33,61,0.12);
}
table.data-table thead th:first-child { background: var(--canvas); z-index: 3; }
table.data-table th:last-child, table.data-table td:last-child {
  position: sticky; right: 0; background: #fff; z-index: 2; box-shadow: -2px 0 4px -2px rgba(20,33,61,0.12);
}
table.data-table thead th:last-child { background: var(--canvas); z-index: 3; }
table.data-table thead th {
  text-align: left;
  background: var(--canvas);
  color: var(--muted);
  font-weight: 700;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.data-table tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
table.data-table tbody tr:last-child td { border-bottom: none; }
table.data-table tbody tr:hover { background: #FAFBFD; }
.row-actions { display: flex; gap: 6px; }
.empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-state svg { width: 40px; height: 40px; margin-bottom: 12px; color: var(--border); }

/* ---------- Status badge ---------- */
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: color-mix(in srgb, var(--badge-color) 14%, white);
  color: var(--badge-color);
  white-space: nowrap;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--badge-color); }

/* ---------- Toasts ---------- */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
.toast {
  background: var(--ink); color: #fff;
  padding: 12px 18px; border-radius: 8px;
  font-size: 13.5px; font-weight: 500;
  box-shadow: var(--shadow);
  opacity: 0; transform: translateY(-8px);
  transition: opacity 0.25s, transform 0.25s;
  max-width: 320px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-success { background: #0F5D46; }
.toast-error { background: var(--danger-dark); }

/* ---------- Modal (delete confirm) ---------- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(20, 33, 61, 0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 150; padding: 20px;
}
.modal { background: #fff; border-radius: var(--radius); padding: 26px; max-width: 400px; width: 100%; box-shadow: var(--shadow); }
.modal h3 { font-size: 17px; margin-bottom: 8px; }
.modal p { color: var(--muted); font-size: 13.5px; margin: 0 0 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ---------- Loading ---------- */
.loading-row { text-align: center; padding: 40px; color: var(--muted); }
.spinner {
  width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--steel);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- Responsive ---------- */
@media (max-width: 900px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .sidebar {
    position: fixed; left: 0; top: 0; height: 100vh; z-index: 30;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-topbar { display: flex; }
  .main { padding: 20px; }
}
@media (max-width: 560px) {
  .stat-grid { grid-template-columns: 1fr; }
}

/* ---------- Print (customer detail) ---------- */
@media print {
  .no-print { display: none !important; }
  body { background: #fff; }
}

/* ---------- Bulk print/PDF report ---------- */
#printReport { display: none; }
@media print {
  #app-shell { display: none !important; }
  #printReport { display: block !important; }
}
#printReport .report-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid var(--ink); padding-bottom: 16px; margin-bottom: 18px; }
#printReport .report-header .company-block { display: flex; align-items: center; gap: 12px; }
#printReport .report-header .company-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
#printReport .report-header .company { font-family: var(--font-head); font-weight: 700; font-size: 18px; color: var(--ink); }
#printReport .report-header .address { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
#printReport .report-title { text-align: right; }
#printReport .report-title h1 { font-family: var(--font-head); font-size: 16px; margin: 0; color: var(--ink); }
#printReport .report-title .meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
#printReport table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
#printReport th { text-align: left; background: #EEF2F7; color: var(--ink); font-weight: 700; padding: 6px 7px; border-bottom: 2px solid var(--ink); white-space: nowrap; }
#printReport td { padding: 6px 7px; border-bottom: 1px solid var(--border); }
#printReport tr.note-row td { padding: 4px 7px 8px 7px; border-bottom: 1px solid var(--border); background: #FAFBFC; font-style: italic; color: var(--muted); }
#printReport .report-footer { margin-top: 16px; font-size: 10.5px; color: var(--muted); text-align: right; }

</style>

<script>

const API_URL = 'https://script.google.com/macros/s/AKfycbxFb-wqcSjnSsP_jPqv_6B1FG912MRO7G2keSJCSgGB6_-n4kQ3SU7OPBpGM7gqr1g/exec';

const COMPANY = {

};

const STATUS_OPTIONS = [

// Order reflects the sales pipeline, used for the funnel visual on the dashboard.
const STATUS_PIPELINE_ORDER = [
  'New Lead',
  'Existing Customer'
];

const STATUS_COLORS = {
  'New Lead': '#94A3B8',
  'Existing Customer': '#10B981'
};

// How this customer/lead first came in. "Other" reveals a free-text box
// so anything not on the list can still be captured.
const SOURCE_OPTIONS = [
  'WhatsApp',
  'Facebook',
  'Instagram',
  'Email',
  'Phone Call',
  'Website',
  'Referral',

/* ---------- Country / currency / serial-prefix configuration ----------
   Each country has a serial-number prefix (e.g. MAL-0001) and a currency.
   Defaults cover the current business segments; more can be added from
   the Add Customer form ("+ Add New Country") without touching code.
   NOTE: custom countries are stored in this browser's localStorage, so
   they are per-device for now — see chat notes on syncing this via the
   Apps Script backend if the whole team needs to see new countries. */

const DEFAULT_COUNTRIES = [
  { name: 'Maldives', prefix: 'MAL', currency: 'USD' },
  { name: 'Seychelles', prefix: 'SEY', currency: 'USD' },
  { name: 'Local', prefix: 'LOC', currency: 'LKR' }
];

const CountryConfig = {
  _key: 'bo_custom_countries',
  _customList() {
    try {
      const raw = localStorage.getItem(this._key);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  },
  getAll() {
    const map = {};
    DEFAULT_COUNTRIES.forEach(function (c) { map[c.name.toLowerCase()] = c; });
    this._customList().forEach(function (c) { map[c.name.toLowerCase()] = c; });
    return Object.values(map).sort(function (a, b) { return a.name.localeCompare(b.name); });
  },
  find(name) {
    const key = String(name || '').toLowerCase();
    return this.getAll().find(function (c) { return c.name.toLowerCase() === key; });
  },
  add(entry) {
    const name = (entry.name || '').trim();
    const prefix = (entry.prefix || '').trim().toUpperCase();
    const currency = (entry.currency || '').trim().toUpperCase();
    if (!name || !prefix || !currency) throw new Error('Country name, serial prefix, and currency are all required.');
    if (!/^[A-Z]{2,5}$/.test(prefix)) throw new Error('Prefix should be 2-5 letters, e.g. MAL, SEY, MAU.');
    if (!/^[A-Z]{3}$/.test(currency)) throw new Error('Currency should be a 3-letter code, e.g. USD, LKR.');
    const existing = this.getAll();
    if (existing.some(function (c) { return c.name.toLowerCase() === name.toLowerCase(); })) throw new Error('That country already exists.');
    if (existing.some(function (c) { return c.prefix.toLowerCase() === prefix.toLowerCase(); })) throw new Error('That serial prefix is already in use — pick a different one.');
    const list = this._customList();
    const record = { name: name, prefix: prefix, currency: currency };
    list.push(record);
    localStorage.setItem(this._key, JSON.stringify(list));
    return record;
  }
};

// Given the current customer list and a country's prefix, work out the next
// serial number in sequence, e.g. existing MAL-0001, MAL-0002 -> MAL-0003.
function nextSerialNo(customers, prefix) {
  let max = 0;
  (customers || []).forEach(function (c) {
    if (c.serialNo && c.serialNo.indexOf(prefix + '-') === 0) {
      const n = parseInt(c.serialNo.slice(prefix.length + 1), 10);
      if (!isNaN(n) && n > max) max = n;
    }
  });
  return prefix + '-' + String(max + 1).padStart(4, '0');
}

  ];

  const icons = {
    grid: '<path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>',
    plus: '<path d="M12 5v14M5 12h14"/>',
    list: '<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>'
  };

  const navHtml = nav.map(function (item) {
    const active = item.key === activePage ? ' active' : '';
    return '<a class="nav-link' + active + '" href="' + item.href + '">' +
      '<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + icons[item.icon] + '</svg>' +
      '<span>' + item.label + '</span></a>';
  }).join('');

  const shell = document.getElementById('app-shell');
  shell.innerHTML =
    '<aside class="sidebar">' +
    '  <div class="brand">' +
    '    <div class="brand-mark"><img src="logo.png" alt="Bark Ornament logo"></div>' +
    '    <div class="brand-text">' +
    '      <div class="brand-name">Bark Ornament</div>' +
    '      <div class="brand-sub">Customer Management</div>' +
    '    </div>' +
    '  </div>' +
    '  <nav class="nav">' + navHtml + '</nav>' +
    '  <div class="sidebar-footer">' + COMPANY.name + '<br>' + COMPANY.address + '</div>' +
    '</aside>' +
    '<div class="mobile-topbar">' +
    '  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">' +
    '    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>' +
    '  </button>' +
    '  <span class="brand-name">Bark Ornament</span>' +
    '</div>' +
    '<main class="main" id="main-content"></main>';

  const toggle = document.getElementById('menuToggle');
  if (toggle) {
    toggle.addEventListener('click', function () {
      document.querySelector('.sidebar').classList.toggle('open');
    });

}

/* ---------- Toast notifications ---------- */

function showToast(message, type) {
  type = type || 'info';
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(function () { toast.classList.add('show'); });
  setTimeout(function () {
    toast.classList.remove('show');
    setTimeout(function () { toast.remove(); }, 300);
  }, 3200);
}

/* ---------- API layer ---------- */

const Api = {
  async getCustomers() {
    if (!API_URL || API_URL.indexOf('PASTE_YOUR') === 0) {
      throw new Error('API_URL is not configured. Edit js/config.js with your Apps Script deployment URL.');
    }
    const res = await fetch(API_URL, { method: 'GET' });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Failed to load customers');
    return json.data;
  },

  async addCustomer(data) {
    return this._post({ action: 'add', data: data });
  },

  async updateCustomer(data) {
    return this._post({ action: 'update', data: data });
  },

  async deleteCustomer(serialNo) {
    return this._post({ action: 'delete', serialNo: serialNo });
  },

  async _post(body) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');
    return json.data;
  }
};

/* ---------- Formatting helpers ---------- */

function formatCurrency(value, currency) {
  const num = Number(value) || 0;
  return (currency || 'USD') + ' ' + num.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function formatDate(value) {
  if (!value) return '—';
  const d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function statusBadge(status) {
  const color = STATUS_COLORS[status] || '#9CA3AF';
  return '<span class="status-badge" style="--badge-color:' + color + '">' +
    '<span class="status-dot"></span>' + status + '</span>';
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ---------- Simple client-side cache shared across pages in one session ---------- */

const CustomerStore = {
  _data: null,
  async load(force) {
    if (this._data && !force) return this._data;
    this._data = await Api.getCustomers();
    return this._data;
  },
  invalidate() { this._data = null; }
};

</script>
<script>
renderShell('customers');

const mainEl = document.getElementById('main-content');
mainEl.innerHTML =
  '<div class="page-header">' +
  '  <div><h1>Customers</h1><p>Search, filter, and manage all customer records.</p></div>' +
  '  <div style="display:flex;gap:10px;flex-wrap:wrap">' +
  '    <button class="btn btn-outline" id="printBtn">' +
  '      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>' +
  '      Print / Save as PDF' +
  '    </button>' +
  '    <button class="btn btn-outline" id="exportBtn">' +
  '      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>' +
  '      Export to Excel' +
  '    </button>' +
  '    <a href="register.html" class="btn btn-accent">' +
  '      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>' +
  '      Add Customer' +
  '    </a>' +
  '  </div>' +
  '</div>' +

  '<div class="card">' +
  '  <div class="table-toolbar">' +
  '    <div class="search-box">' +
  '      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>' +
  '      <input type="text" id="searchInput" placeholder="Search by name, company, or email…">' +
  '    </div>' +
  '    <select id="filterCountry"><option value="">All Countries</option></select>' +
  '    <select id="filterIndustry"><option value="">All Industries</option></select>' +
  '    <select id="filterStatus"><option value="">All Statuses</option></select>' +
  '    <select id="filterSource"><option value="">All Sources</option></select>' +
  '    <select id="filterResponsible"><option value="">All Responsible Persons</option></select>' +
  '  </div>' +
  '  <div class="table-wrap">' +
  '    <table class="data-table">' +
  '      <thead><tr>' +
  '        <th>Serial No</th><th>Company</th><th>Customer Name</th><th>Contact Person</th><th>Position</th><th>Country</th>' +
  '        <th>Industry</th><th>Status</th><th>Source</th><th>Responsible Person</th><th>Email</th><th>Phone</th>' +
  '        <th>Expected Vol.</th><th>Current Vol.</th><th>Created</th><th>Notes</th><th></th>' +
  '      </tr></thead>' +
  '      <tbody id="tableBody"><tr><td colspan="17" class="loading-row"><div class="spinner"></div>Loading customers…</td></tr></tbody>' +
  '    </table>' +
  '  </div>' +
  '</div>';

let allCustomers = [];
let filtered = [];
let pendingDelete = null;

// Short preview for the table cell; full text is available on hover via the title attribute.
function notesPreview(notes) {
  if (!notes) return '<span style="color:var(--muted);">—</span>';
  const short = notes.length > 40 ? notes.slice(0, 40) + '…' : notes;
  return '<span title="' + escapeHtml(notes) + '" style="cursor:help;">' + escapeHtml(short) + '</span>';
}

function populateFilterOptions() {
  function uniqueSorted(key) {
    return [...new Set(allCustomers.map(c => c[key]).filter(Boolean))].sort();
  }
  const countrySel = document.getElementById('filterCountry');
  const industrySel = document.getElementById('filterIndustry');
  const statusSel = document.getElementById('filterStatus');
  const sourceSel = document.getElementById('filterSource');
  const responsibleSel = document.getElementById('filterResponsible');

  uniqueSorted('country').forEach(v => countrySel.insertAdjacentHTML('beforeend', '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>'));
  uniqueSorted('industry').forEach(v => industrySel.insertAdjacentHTML('beforeend', '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>'));
  STATUS_OPTIONS.forEach(v => statusSel.insertAdjacentHTML('beforeend', '<option value="' + v + '">' + v + '</option>'));
  uniqueSorted('source').forEach(v => sourceSel.insertAdjacentHTML('beforeend', '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>'));
  uniqueSorted('responsiblePerson').forEach(v => responsibleSel.insertAdjacentHTML('beforeend', '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>'));
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const country = document.getElementById('filterCountry').value;
  const industry = document.getElementById('filterIndustry').value;
  const status = document.getElementById('filterStatus').value;
  const source = document.getElementById('filterSource').value;
  const responsible = document.getElementById('filterResponsible').value;

  filtered = allCustomers.filter(function (c) {
    const matchesQ = !q ||
      (c.companyName || '').toLowerCase().includes(q) ||
      (c.customerName || '').toLowerCase().includes(q) ||
      (c.contactPerson || '').toLowerCase().includes(q) ||
      (c.email || '').toLowerCase().includes(q) ||
      (c.serialNo || '').toLowerCase().includes(q);
    const matchesCountry = !country || c.country === country;
    const matchesIndustry = !industry || c.industry === industry;
    const matchesStatus = !status || c.status === status;
    const matchesSource = !source || c.source === source;
    const matchesResponsible = !responsible || c.responsiblePerson === responsible;
    return matchesQ && matchesCountry && matchesIndustry && matchesStatus && matchesSource && matchesResponsible;
  });

  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="17"><div class="empty-state">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>' +
      '<div>No customers match your search or filters.</div></div></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(function (c) {
    return '<tr>' +
      '<td>' + escapeHtml(c.serialNo) + '</td>' +
      '<td><strong>' + escapeHtml(c.companyName) + '</strong></td>' +
      '<td>' + escapeHtml(c.customerName) + '</td>' +
      '<td>' + escapeHtml(c.contactPerson) + '</td>' +
      '<td>' + escapeHtml(c.contactPersonPosition) + '</td>' +
      '<td>' + escapeHtml(c.country) + '</td>' +
      '<td>' + escapeHtml(c.industry) + '</td>' +
      '<td>' + statusBadge(c.status) + '</td>' +
      '<td>' + escapeHtml(c.source) + '</td>' +
      '<td>' + escapeHtml(c.responsiblePerson) + '</td>' +
      '<td>' + escapeHtml(c.email) + '</td>' +
      '<td>' + escapeHtml(c.contactNumber) + '</td>' +
      '<td>' + formatCurrency(c.expectedSalesVolume, c.currency) + '</td>' +
      '<td>' + formatCurrency(c.currentSalesVolume, c.currency) + '</td>' +
      '<td>' + formatDate(c.createdDate) + '</td>' +
      '<td>' + notesPreview(c.notes) + '</td>' +
      '<td><div class="row-actions">' +
      '  <a class="btn btn-outline btn-sm" href="register.html?edit=' + encodeURIComponent(c.serialNo) + '" title="Edit">Edit</a>' +
      '  <a class="btn btn-outline btn-sm" href="customer-detail.html?id=' + encodeURIComponent(c.serialNo) + '" title="Print">Print</a>' +
      '  <button class="btn btn-danger btn-sm" data-delete="' + escapeHtml(c.serialNo) + '" title="Delete">Delete</button>' +
      '</div></td>' +
      '</tr>';
  }).join('');

  tbody.querySelectorAll('[data-delete]').forEach(function (btn) {
    btn.addEventListener('click', function () { confirmDelete(btn.getAttribute('data-delete')); });
  });

  updateScrollHint();
}

function updateScrollHint() {
  const wrap = document.querySelector('.table-wrap');
  if (!wrap) return;
  if (wrap.scrollWidth > wrap.clientWidth + 4) wrap.classList.add('has-more');
  else wrap.classList.remove('has-more');
}
window.addEventListener('resize', updateScrollHint);

function confirmDelete(serialNo) {
  pendingDelete = serialNo;
  const record = allCustomers.find(c => c.serialNo === serialNo);
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'deleteModal';
  backdrop.innerHTML =
    '<div class="modal">' +
    '  <h3>Delete customer?</h3>' +
    '  <p>This will permanently remove <strong>' + escapeHtml(record ? record.companyName : serialNo) + '</strong> (' + escapeHtml(serialNo) + ') from the sheet. This cannot be undone.</p>' +
    '  <div class="modal-actions">' +
    '    <button class="btn btn-outline" id="cancelDelete">Cancel</button>' +
    '    <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>' +
    '  </div>' +
    '</div>';
  document.body.appendChild(backdrop);

  document.getElementById('cancelDelete').addEventListener('click', function () { backdrop.remove(); });
  backdrop.addEventListener('click', function (e) { if (e.target === backdrop) backdrop.remove(); });
  document.getElementById('confirmDeleteBtn').addEventListener('click', async function () {
    const btn = document.getElementById('confirmDeleteBtn');
    btn.disabled = true;
    btn.textContent = 'Deleting…';
    try {
      await Api.deleteCustomer(pendingDelete);
      showToast('Customer deleted.', 'success');
      CustomerStore.invalidate();
      backdrop.remove();
      await loadCustomers();
    } catch (err) {
      showToast('Error deleting: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Delete';
    }
  });
}

function exportToExcel() {
  if (filtered.length === 0) {
    showToast('No records to export.', 'error');
    return;
  }
  const rows = filtered.map(function (c) {
    return {
      'Serial No': c.serialNo,
      'Company Name': c.companyName,
      'Customer Name': c.customerName,
      'Country': c.country,
      'Contact Person': c.contactPerson,
      'Contact Person Position': c.contactPersonPosition,
      'Industry': c.industry,
      'Email': c.email,
      'Contact Number': c.contactNumber,
      'Nationality': c.nationality,
      'Status': c.status,
      'Source': c.source,
      'Responsible Person': c.responsiblePerson,
      'Currency': c.currency || 'USD',
      'Expected Sales Volume': c.expectedSalesVolume,
      'Current Sales Volume': c.currentSalesVolume,
      'Created Date': formatDate(c.createdDate),
      'Notes': c.notes
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Customers');
  XLSX.writeFile(wb, 'Bark_Ornament_Customers_' + new Date().toISOString().slice(0, 10) + '.xlsx');
}

async function loadCustomers(force) {
  const tbody = document.getElementById('tableBody');
  try {
    allCustomers = await CustomerStore.load(force);
    if (document.getElementById('filterCountry').children.length === 1) {
      populateFilterOptions();
    }
    applyFilters();
  } catch (err) {
    tbody.innerHTML = '<tr><td colspan="17"><div class="empty-state" style="color:var(--danger-dark)">Error loading data: ' + escapeHtml(err.message) + '</div></td></tr>';
  }
}

function activeFilterSummary() {
  const parts = [];
  const country = document.getElementById('filterCountry').value;
  const industry = document.getElementById('filterIndustry').value;
  const status = document.getElementById('filterStatus').value;
  const source = document.getElementById('filterSource').value;
  const responsible = document.getElementById('filterResponsible').value;
  const q = document.getElementById('searchInput').value.trim();
  if (country) parts.push('Country: ' + country);
  if (industry) parts.push('Industry: ' + industry);
  if (status) parts.push('Status: ' + status);
  if (source) parts.push('Source: ' + source);
  if (responsible) parts.push('Responsible: ' + responsible);
  if (q) parts.push('Search: "' + q + '"');
  return parts.length ? parts.join('  \u00b7  ') : 'All customers';
}

function generatePrintReport() {
  if (filtered.length === 0) {
    showToast('No records to print — adjust your filters first.', 'error');
    return;
  }
  const rowsHtml = filtered.map(function (c) {
    const mainRow = '<tr>' +
      '<td>' + escapeHtml(c.serialNo) + '</td>' +
      '<td>' + escapeHtml(c.companyName) + '</td>' +
      '<td>' + escapeHtml(c.customerName) + '</td>' +
      '<td>' + escapeHtml(c.contactPerson) + '</td>' +
      '<td>' + escapeHtml(c.contactPersonPosition) + '</td>' +
      '<td>' + escapeHtml(c.country) + '</td>' +
      '<td>' + escapeHtml(c.industry) + '</td>' +
      '<td>' + escapeHtml(c.status) + '</td>' +
      '<td>' + escapeHtml(c.source) + '</td>' +
      '<td>' + escapeHtml(c.responsiblePerson) + '</td>' +
      '<td>' + escapeHtml(c.email) + '</td>' +
      '<td>' + escapeHtml(c.contactNumber) + '</td>' +
      '<td>' + formatCurrency(c.expectedSalesVolume, c.currency) + '</td>' +
      '<td>' + formatCurrency(c.currentSalesVolume, c.currency) + '</td>' +
      '<td>' + formatDate(c.createdDate) + '</td>' +
      '</tr>';
    const noteRow = c.notes
      ? '<tr class="note-row"><td colspan="15"><strong>Note:</strong> ' + escapeHtml(c.notes) + '</td></tr>'
      : '';
    return mainRow + noteRow;
  }).join('');

  document.getElementById('printReport').innerHTML =
    '<div class="report-header">' +
    '  <div class="company-block"><img class="company-logo" src="logo.png" alt="Bark Ornament logo"><div><div class="company">' + escapeHtml(COMPANY.name) + '</div><div class="address">' + escapeHtml(COMPANY.address) + '</div></div></div>' +
    '  <div class="report-title"><h1>Customer Report</h1><div class="meta">' + escapeHtml(activeFilterSummary()) + '</div>' +
    '  <div class="meta">' + filtered.length + ' record' + (filtered.length === 1 ? '' : 's') + '</div></div>' +
    '</div>' +
    '<table><thead><tr>' +
    '<th>Serial No</th><th>Company</th><th>Customer</th><th>Contact</th><th>Position</th><th>Country</th><th>Industry</th>' +
    '<th>Status</th><th>Source</th><th>Responsible</th><th>Email</th><th>Phone</th><th>Expected Vol.</th><th>Current Vol.</th><th>Created</th>' +
    '</tr></thead><tbody>' + rowsHtml + '</tbody></table>' +
    '<div class="report-footer">Generated on ' + formatDate(new Date()) + ' — ' + escapeHtml(COMPANY.name) + '</div>';

  window.print();
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('filterCountry').addEventListener('change', applyFilters);
document.getElementById('filterIndustry').addEventListener('change', applyFilters);
document.getElementById('filterStatus').addEventListener('change', applyFilters);
document.getElementById('filterSource').addEventListener('change', applyFilters);
document.getElementById('filterResponsible').addEventListener('change', applyFilters);
document.getElementById('exportBtn').addEventListener('click', exportToExcel);
document.getElementById('printBtn').addEventListener('click', generatePrintReport);

loadCustomers();
</script>
</body>
</html>
