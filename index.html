<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Bark Ornament CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">
<style>
/* ============================================================
   Bark Ornament — Customer Management System
   Design tokens
   ============================================================ */
:root {
  --ink: #0F2A47;          /* deep navy — sidebar / primary dark */
  --ink-light: #1B3A5C;    /* lighter navy for gradients/hover */
  --steel: #2E6096;        /* steel blue — links, secondary */
  --steel-dark: #1F4670;   /* steel blue hover/active state */
  --accent: #2E6096;       /* primary accent = steel blue (kept as alias for compatibility) */
  --accent-dark: #1F4670;
  --canvas: #F4F6F9;       /* page background */
  --card: #FFFFFF;
  --text: #1F2937;
  --muted: #6B7280;
  --border: #E3E7ED;
  --danger: #EF4444;
  --danger-dark: #C0392B;
  --success: #10B981;
  --radius: 10px;
  --shadow: 0 1px 2px rgba(20, 33, 61, 0.06), 0 4px 16px rgba(20, 33, 61, 0.06);
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-head: 'Sora', 'Inter', sans-serif;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--canvas);
  color: var(--text);
  font-size: 14.5px;
  line-height: 1.5;
}
h1, h2, h3, h4 { font-family: var(--font-head); margin: 0; color: var(--ink); }
a { color: var(--steel); text-decoration: none; }
button, input, select, textarea { font-family: inherit; font-size: inherit; }

/* ---------- App shell ---------- */
#app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px;
  background: var(--ink);
  color: #E7EBF3;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.brand-mark {
  width: 42px; height: 42px;
  border-radius: 50%;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
}
.brand-mark img { width: 100%; height: 100%; object-fit: cover; display: block; }
.brand-name { font-family: var(--font-head); font-weight: 600; font-size: 15px; color: #fff; }
.brand-sub { font-size: 11.5px; color: #9BA9C4; margin-top: 2px; }

.nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-link {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  color: #C4CDE0;
  font-size: 14px;
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
}
.nav-link:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-link.active { background: var(--steel); color: #fff; font-weight: 600; }
.nav-icon { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-footer {
  padding: 16px 20px 22px;
  font-size: 11px;
  color: #7C8AA8;
  border-top: 1px solid rgba(255,255,255,0.08);
  line-height: 1.5;
}
.session-info {
  font-size: 12px;
  color: #C7D0E0;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.session-info strong { color: #fff; font-weight: 600; word-break: break-all; }
.session-info a { color: #8FB6E0; }
.session-info a:hover { color: #fff; }

.mobile-topbar {
  display: none;
  align-items: center;
  gap: 12px;
  background: var(--ink);
  color: #fff;
  padding: 14px 16px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.menu-toggle { background: none; border: none; color: #fff; padding: 4px; cursor: pointer; }
.menu-toggle svg { width: 22px; height: 22px; }

.main {
  flex: 1;
  padding: 32px 36px;
  max-width: 1400px;
  width: 100%;
}

/* ---------- Page header ---------- */
.page-header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
.page-header h1 { font-size: 24px; }
.page-header p { color: var(--muted); margin: 6px 0 0; font-size: 13.5px; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  border-radius: 8px;
  border: 1px solid transparent;
  font-weight: 600;
  font-size: 13.5px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s, background 0.15s;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: #1d2f52; }
.btn-accent { background: var(--steel); color: #fff; }
.btn-accent:hover { background: var(--steel-dark); color: #fff; }
.btn-outline { background: #fff; color: var(--ink); border-color: var(--border); }
.btn-outline:hover { border-color: var(--steel); color: var(--steel); }
.btn-danger { background: #FDECEC; color: var(--danger-dark); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12.5px; }
.btn svg { width: 15px; height: 15px; }
.btn:disabled { opacity: 0.55; cursor: not-allowed; }

/* ---------- Cards ---------- */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 22px;
}

/* ---------- Dashboard stat grid ---------- */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 18px; margin-bottom: 24px; }
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px 22px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.stat-card .stat-label { font-size: 12.5px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
.stat-card .stat-value { font-family: var(--font-head); font-size: 26px; font-weight: 700; color: var(--ink); margin-top: 8px; }
.stat-card .stat-accent { position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--steel); }

.dash-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
@media (max-width: 1080px) { .dash-grid { grid-template-columns: 1fr; } }

/* ---------- Pipeline funnel (signature element) ---------- */
.funnel { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
.funnel-row { display: grid; grid-template-columns: 130px 1fr 40px; align-items: center; gap: 12px; }
.funnel-label { font-size: 12.5px; font-weight: 600; color: var(--text); }
.funnel-track { height: 10px; background: var(--canvas); border-radius: 6px; overflow: hidden; }
.funnel-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
.funnel-count { font-size: 12.5px; font-weight: 700; color: var(--muted); text-align: right; }

/* ---------- Country summary list ---------- */
.country-list { display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto; }
.country-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 4px; border-bottom: 1px solid var(--border); font-size: 13.5px; }
.country-row:last-child { border-bottom: none; }
.country-count { background: var(--canvas); color: var(--ink); font-weight: 700; padding: 2px 10px; border-radius: 20px; font-size: 12px; }

/* ---------- Forms ---------- */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 20px; }
@media (max-width: 720px) { .form-grid { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: 1 / -1; }
.field label { font-size: 12.5px; font-weight: 600; color: var(--text); }
.field .hint { font-size: 11.5px; color: var(--muted); }
.field input, .field select {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus, .field select:focus {
  border-color: var(--steel);
  box-shadow: 0 0 0 3px rgba(58, 90, 140, 0.15);
}
.field input.invalid, .field select.invalid { border-color: var(--danger); }
.field .error-msg { font-size: 11.5px; color: var(--danger); min-height: 14px; }
.form-actions { display: flex; gap: 12px; margin-top: 22px; justify-content: flex-end; }

/* ---------- Table ---------- */
.table-toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
.search-box { position: relative; flex: 1; min-width: 220px; }
.search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); }
.search-box input { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid var(--border); border-radius: 8px; }
.table-toolbar select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; background: #fff; }

.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: #fff; }
table.data-table { width: 100%; border-collapse: collapse; font-size: 13.3px; min-width: 900px; }
table.data-table thead th {
  text-align: left;
  background: var(--canvas);
  color: var(--muted);
  font-weight: 700;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.data-table tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.data-table tbody tr:last-child td { border-bottom: none; }
table.data-table tbody tr:hover { background: #FAFBFD; }
.row-actions { display: flex; gap: 6px; }
.empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-state svg { width: 40px; height: 40px; margin-bottom: 12px; color: var(--border); }

/* ---------- Status badge ---------- */
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: color-mix(in srgb, var(--badge-color) 14%, white);
  color: var(--badge-color);
  white-space: nowrap;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--badge-color); }

/* ---------- Toasts ---------- */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
.toast {
  background: var(--ink); color: #fff;
  padding: 12px 18px; border-radius: 8px;
  font-size: 13.5px; font-weight: 500;
  box-shadow: var(--shadow);
  opacity: 0; transform: translateY(-8px);
  transition: opacity 0.25s, transform 0.25s;
  max-width: 320px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-success { background: #0F5D46; }
.toast-error { background: var(--danger-dark); }

/* ---------- Modal (delete confirm) ---------- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(20, 33, 61, 0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 150; padding: 20px;
}
.modal { background: #fff; border-radius: var(--radius); padding: 26px; max-width: 400px; width: 100%; box-shadow: var(--shadow); }
.modal h3 { font-size: 17px; margin-bottom: 8px; }
.modal p { color: var(--muted); font-size: 13.5px; margin: 0 0 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ---------- Loading ---------- */
.loading-row { text-align: center; padding: 40px; color: var(--muted); }
.spinner {
  width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--steel);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- Responsive ---------- */
@media (max-width: 900px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .sidebar {
    position: fixed; left: 0; top: 0; height: 100vh; z-index: 30;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-topbar { display: flex; }
  .main { padding: 20px; }
}
@media (max-width: 560px) {
  .stat-grid { grid-template-columns: 1fr; }
}

/* ---------- Print (customer detail) ---------- */
@media print {
  .no-print { display: none !important; }
  body { background: #fff; }
}

</style>
</head>

<script>
/**
 * Paste your deployed Google Apps Script Web App URL below.
 * Deploy > New deployment > Web app > Execute as: Me > Who has access: Anyone
 * The URL ends with /exec
 */
const API_URL = 'https://script.google.com/macros/s/AKfycbxFb-wqcSjnSsP_jPqv_6B1FG912MRO7G2keSJCSgGB6_-n4kQ3SU7OPBpGM7gqr1g/exec';

const COMPANY = {
  name: 'Bark Ornament Private Limited',
  address: 'No. 59A Bekkegama, Panadura'
};

const STATUS_OPTIONS = [
  'New Lead',
  'Existing Customer'
];

// Order reflects the sales pipeline, used for the funnel visual on the dashboard.
const STATUS_PIPELINE_ORDER = [
  'New Lead',
  'Existing Customer'
];

const STATUS_COLORS = {
  'New Lead': '#94A3B8',
  'Existing Customer': '#10B981'
};

/* ---------- Country / currency / serial-prefix configuration ----------
   Each country has a serial-number prefix (e.g. MAL-0001) and a currency.
   Defaults cover the current business segments; more can be added from
   the Add Customer form ("+ Add New Country") without touching code.
   NOTE: custom countries are stored in this browser's localStorage, so
   they are per-device for now — see chat notes on syncing this via the
   Apps Script backend if the whole team needs to see new countries. */

const DEFAULT_COUNTRIES = [
  { name: 'Maldives', prefix: 'MAL', currency: 'USD' },
  { name: 'Seychelles', prefix: 'SEY', currency: 'USD' },
  { name: 'Local', prefix: 'LOC', currency: 'LKR' }
];

const CountryConfig = {
  _key: 'bo_custom_countries',
  _customList() {
    try {
      const raw = localStorage.getItem(this._key);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  },
  getAll() {
    const map = {};
    DEFAULT_COUNTRIES.forEach(function (c) { map[c.name.toLowerCase()] = c; });
    this._customList().forEach(function (c) { map[c.name.toLowerCase()] = c; });
    return Object.values(map).sort(function (a, b) { return a.name.localeCompare(b.name); });
  },
  find(name) {
    const key = String(name || '').toLowerCase();
    return this.getAll().find(function (c) { return c.name.toLowerCase() === key; });
  },
  add(entry) {
    const name = (entry.name || '').trim();
    const prefix = (entry.prefix || '').trim().toUpperCase();
    const currency = (entry.currency || '').trim().toUpperCase();
    if (!name || !prefix || !currency) throw new Error('Country name, serial prefix, and currency are all required.');
    if (!/^[A-Z]{2,5}$/.test(prefix)) throw new Error('Prefix should be 2-5 letters, e.g. MAL, SEY, MAU.');
    if (!/^[A-Z]{3}$/.test(currency)) throw new Error('Currency should be a 3-letter code, e.g. USD, LKR.');
    const existing = this.getAll();
    if (existing.some(function (c) { return c.name.toLowerCase() === name.toLowerCase(); })) throw new Error('That country already exists.');
    if (existing.some(function (c) { return c.prefix.toLowerCase() === prefix.toLowerCase(); })) throw new Error('That serial prefix is already in use — pick a different one.');
    const list = this._customList();
    const record = { name: name, prefix: prefix, currency: currency };
    list.push(record);
    localStorage.setItem(this._key, JSON.stringify(list));
    return record;
  }
};

// Given the current customer list and a country's prefix, work out the next
// serial number in sequence, e.g. existing MAL-0001, MAL-0002 -> MAL-0003.
function nextSerialNo(customers, prefix) {
  let max = 0;
  (customers || []).forEach(function (c) {
    if (c.serialNo && c.serialNo.indexOf(prefix + '-') === 0) {
      const n = parseInt(c.serialNo.slice(prefix.length + 1), 10);
      if (!isNaN(n) && n > max) max = n;
    }
  });
  return prefix + '-' + String(max + 1).padStart(4, '0');
}


/* ============================================================
   Bark Ornament — Customer Management System
   Shared utilities: navigation shell, API calls, helpers
   ============================================================ */

/* ---------- Navigation shell ---------- */

function renderShell(activePage) {
  const session = Session.get();
  const isAdmin = !!session && session.role === 'admin';

  const nav = [
    { key: 'dashboard', label: 'Dashboard', href: 'index.html', icon: 'grid' },
    { key: 'register', label: 'Add Customer', href: 'register.html', icon: 'plus' },
    { key: 'customers', label: 'Customers', href: 'customers.html', icon: 'list' },
    { key: 'quotations', label: 'Quotations', href: 'quotations.html', icon: 'quote' },
    { key: 'invoices', label: 'Invoices', href: 'invoices.html', icon: 'invoice' },
    { key: 'pos', label: 'Purchase Orders', href: 'pos.html', icon: 'po' }
  ];
  if (isAdmin) {
    nav.push({ key: 'team', label: 'Team Access', href: 'login.html', icon: 'team' });
  }

  const icons = {
    grid: '<path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>',
    plus: '<path d="M12 5v14M5 12h14"/>',
    list: '<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
    quote: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 15h6M9 11h3"/>',
    invoice: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 17h6M9 13h6"/>',
    po: '<path d="M9 14l2 2 4-4"/><path d="M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9c2.06 0 3.96.7 5.47 1.86"/><path d="M16 4l2 2-2 2"/>',
    team: '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>'
  };

  const navHtml = nav.map(function (item) {
    const active = item.key === activePage ? ' active' : '';
    return '<a class="nav-link' + active + '" href="' + item.href + '">' +
      '<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + icons[item.icon] + '</svg>' +
      '<span>' + item.label + '</span></a>';
  }).join('');

  const shell = document.getElementById('app-shell');
  shell.innerHTML =
    '<aside class="sidebar">' +
    '  <div class="brand">' +
    '    <div class="brand-mark"><img src="logo.png" alt="Bark Ornament logo"></div>' +
    '    <div class="brand-text">' +
    '      <div class="brand-name">Bark Ornament</div>' +
    '      <div class="brand-sub">Customer Management</div>' +
    '    </div>' +
    '  </div>' +
    '  <nav class="nav">' + navHtml + '</nav>' +
    '  <div class="sidebar-footer">' +
    (session ?
      '<div class="session-info"><strong>' + escapeHtml(session.email) + '</strong><br>' +
      (isAdmin ? 'Admin' : 'Team member') + ' &middot; <a href="#" id="logoutLink">Log out</a></div>' : '') +
    COMPANY.name + '<br>' + COMPANY.address +
    '</div>' +
    '</aside>' +
    '<div class="mobile-topbar">' +
    '  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">' +
    '    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>' +
    '  </button>' +
    '  <span class="brand-name">Bark Ornament</span>' +
    '</div>' +
    '<main class="main" id="main-content"></main>';

  const logoutLink = document.getElementById('logoutLink');
  if (logoutLink) {
    logoutLink.addEventListener('click', function (e) {
      e.preventDefault();
      Session.logout();
    });
  }

  const toggle = document.getElementById('menuToggle');
  if (toggle) {
    toggle.addEventListener('click', function () {
      document.querySelector('.sidebar').classList.toggle('open');
    });
  }
}

/* ---------- Toast notifications ---------- */

function showToast(message, type) {
  type = type || 'info';
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(function () { toast.classList.add('show'); });
  setTimeout(function () {
    toast.classList.remove('show');
    setTimeout(function () { toast.remove(); }, 300);
  }, 3200);
}

/* ---------- Session / auth ----------
   Login is required to use this app. A logged-in session (email, role,
   signed token, expiry) is cached in localStorage so people stay signed
   in across visits until the token expires (server-side, default 12h)
   or they log out. The role check here only controls what UI is shown —
   the real security boundary is the token check the backend does on
   every add/update/delete request. */
const Session = {
  _key: 'bo_session',
  get() {
    try {
      const raw = localStorage.getItem(this._key);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !s.token || !s.exp || Date.now() > s.exp) { this.clear(); return null; }
      return s;
    } catch (e) { return null; }
  },
  set(s) { try { localStorage.setItem(this._key, JSON.stringify(s)); } catch (e) { /* ignore */ } },
  clear() { try { localStorage.removeItem(this._key); } catch (e) { /* ignore */ } },
  isAdmin() { const s = this.get(); return !!s && s.role === 'admin'; },
  /** Redirects to login.html if there's no valid session; returns the session otherwise. */
  requireLogin() {
    const s = this.get();
    if (!s) {
      const here = encodeURIComponent(location.pathname.split('/').pop() + location.search);
      window.location.href = 'login.html?redirect=' + here;
      return null;
    }
    return s;
  },
  logout() {
    this.clear();
    window.location.href = 'login.html';
  }
};

/* ---------- API layer ---------- */

const Api = {
  async getCustomers() {
    if (!API_URL || API_URL.indexOf('PASTE_YOUR') === 0) {
      throw new Error('API_URL is not configured. Edit js/config.js with your Apps Script deployment URL.');
    }
    const s = Session.get();
    const url = API_URL + '?token=' + encodeURIComponent(s ? s.token : '');
    const res = await fetch(url, { method: 'GET' });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || 'Failed to load customers'); }
    return json.data;
  },

  async addCustomer(data) {
    return this._post({ action: 'add', data: data });
  },

  async updateCustomer(data) {
    return this._post({ action: 'update', data: data });
  },

  async deleteCustomer(serialNo) {
    return this._post({ action: 'delete', serialNo: serialNo });
  },

  async getQuotations() {
    return this._get('quotations');
  },

  async getInvoices() {
    return this._get('invoices');
  },

  async getPOs() {
    return this._get('pos');
  },

  async _get(action) {
    const s = Session.get();
    const url = API_URL + '?action=' + encodeURIComponent(action) + '&token=' + encodeURIComponent(s ? s.token : '');
    const res = await fetch(url, { method: 'GET' });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || ('Failed to load ' + action)); }
    return json.data;
  },

  async _post(body) {
    const s = Session.get();
    body.token = s ? s.token : '';
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || 'Request failed'); }
    return json.data;
  }
};

/** If the backend rejected a call because the session is invalid/expired,
 *  clear it and send the person back to login instead of just erroring. */
function handleAuthError(errorCode) {
  if (errorCode === 'AUTH_REQUIRED') {
    Session.clear();
    if (typeof showToast === 'function') showToast('Your session has expired — please log in again.', 'error');
    setTimeout(function () { window.location.href = 'login.html'; }, 1200);
  }
}

/* ---------- Formatting helpers ---------- */

function formatCurrency(value, currency) {
  const num = Number(value) || 0;
  return (currency || 'USD') + ' ' + num.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function formatDate(value) {
  if (!value) return '—';
  const d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function statusBadge(status) {
  const color = STATUS_COLORS[status] || '#9CA3AF';
  return '<span class="status-badge" style="--badge-color:' + color + '">' +
    '<span class="status-dot"></span>' + status + '</span>';
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ---------- Simple client-side cache shared across pages in one session ---------- */

const CustomerStore = {
  _data: null,
  async load(force) {
    if (this._data && !force) return this._data;
    this._data = await Api.getCustomers();
    return this._data;
  },
  invalidate() { this._data = null; }
};

</script>
<script>
const currentSession = Session.requireLogin();
if (!currentSession) { throw new Error('Redirecting to login…'); }

renderShell('dashboard');

const mainEl = document.getElementById('main-content');
mainEl.innerHTML =
  '<div class="page-header">' +
  '  <div><h1>Dashboard</h1><p>Overview of your customer pipeline and sales volumes.</p></div>' +
  '</div>' +
  '<div id="stat-grid" class="stat-grid"></div>' +
  '<div class="dash-grid">' +
  '  <div class="card">' +
  '    <h3>Sales Pipeline</h3>' +
  '    <div id="funnel" class="funnel"></div>' +
  '  </div>' +
  '  <div class="card">' +
  '    <h3>Country-wise Summary</h3>' +
  '    <div id="country-list" class="country-list"></div>' +
  '  </div>' +
  '  <div class="card">' +
  '    <h3>Quotations Summary</h3>' +
  '    <div id="quotation-summary"></div>' +
  '  </div>' +
  '  <div class="card">' +
  '    <h3>Invoices Summary</h3>' +
  '    <div id="invoice-summary"></div>' +
  '  </div>' +
  '  <div class="card">' +
  '    <h3>Purchase Orders Summary</h3>' +
  '    <div id="po-summary"></div>' +
  '  </div>' +
  '</div>';

function statCard(label, value, accent) {
  return '<div class="stat-card">' + (accent ? '<div class="stat-accent"></div>' : '') +
    '<div class="stat-label">' + label + '</div><div class="stat-value">' + value + '</div></div>';
}

async function loadDashboard() {
  document.getElementById('stat-grid').innerHTML =
    '<div class="loading-row" style="grid-column:1/-1"><div class="spinner"></div>Loading dashboard…</div>';

  // Fire all four requests off at once instead of waiting for each one to
  // finish before starting the next — each is a separate round trip to the
  // Apps Script backend, so awaiting them one-by-one was adding up to
  // several seconds of pure waiting on every dashboard load.
  const customersPromise = CustomerStore.load();
  const quotationsPromise = Api.getQuotations();
  const invoicesPromise = Api.getInvoices();
  const posPromise = Api.getPOs();

  try {
    const customers = await customersPromise;

    const total = customers.length;
    const active = customers.filter(c => c.status === 'Existing Customer').length;
    const newLeads = customers.filter(c => c.status === 'New Lead').length;

    // Sales volumes are kept separate per currency — Maldives/Seychelles run in USD,
    // Local runs in LKR, so a single combined total would mix currencies together.
    const totalsByCurrency = {};
    customers.forEach(function (c) {
      const cur = c.currency || 'USD';
      if (!totalsByCurrency[cur]) totalsByCurrency[cur] = { expectedMonthly: 0, expected: 0, current: 0 };
      totalsByCurrency[cur].expectedMonthly += Number(c.expectedSalesVolumeMonthly) || 0;
      totalsByCurrency[cur].expected += Number(c.expectedSalesVolume) || 0;
      totalsByCurrency[cur].current += Number(c.currentSalesVolume) || 0;
    });

    let statHtml = statCard('Total Customers', total, true) +
      statCard('Existing Customers', active) +
      statCard('New Leads', newLeads);
    Object.keys(totalsByCurrency).sort().forEach(function (cur) {
      statHtml += statCard('Expected Vol. (' + cur + ') \u2013 Monthly', formatCurrency(totalsByCurrency[cur].expectedMonthly, cur));
      statHtml += statCard('Expected Vol. (' + cur + ') \u2013 Annually', formatCurrency(totalsByCurrency[cur].expected, cur));
      statHtml += statCard('Current Vol. (' + cur + ')', formatCurrency(totalsByCurrency[cur].current, cur));
    });
    document.getElementById('stat-grid').innerHTML = statHtml;

    // Funnel
    const maxCount = Math.max(1, ...STATUS_PIPELINE_ORDER.map(s => customers.filter(c => c.status === s).length));
    document.getElementById('funnel').innerHTML = STATUS_PIPELINE_ORDER.map(function (status) {
      const count = customers.filter(c => c.status === status).length;
      const pct = Math.round((count / maxCount) * 100);
      const color = STATUS_COLORS[status];
      return '<div class="funnel-row">' +
        '<div class="funnel-label">' + status + '</div>' +
        '<div class="funnel-track"><div class="funnel-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
        '<div class="funnel-count">' + count + '</div>' +
        '</div>';
    }).join('');

    // Country summary
    const countryMap = {};
    customers.forEach(function (c) {
      const key = c.country || 'Unspecified';
      countryMap[key] = (countryMap[key] || 0) + 1;
    });
    const countryEntries = Object.entries(countryMap).sort((a, b) => b[1] - a[1]);
    const countryListEl = document.getElementById('country-list');
    if (countryEntries.length === 0) {
      countryListEl.innerHTML = '<div class="empty-state">No customer data yet.</div>';
    } else {
      countryListEl.innerHTML = countryEntries.map(function ([country, count]) {
        return '<div class="country-row"><span>' + escapeHtml(country) + '</span><span class="country-count">' + count + '</span></div>';
      }).join('');
    }
  } catch (err) {
    document.getElementById('stat-grid').innerHTML =
      '<div class="card" style="grid-column:1/-1;color:var(--danger-dark)">Error loading data: ' + escapeHtml(err.message) + '</div>';
    document.getElementById('funnel').innerHTML = '';
    document.getElementById('country-list').innerHTML = '';
  }

  // Quotations summary
  try {
    const quotations = await quotationsPromise;
    const qSums = {};
    const qStatusCounts = {};
    quotations.forEach(function (r) {
      const cur = r.currency || 'USD';
      qSums[cur] = (qSums[cur] || 0) + (Number(r.value) || 0);
      const st = r.status || 'Pending';
      qStatusCounts[st] = (qStatusCounts[st] || 0) + 1;
    });
    let qHtml = '<div class="country-row"><span>Total Quotations</span><span class="country-count">' + quotations.length + '</span></div>';
    Object.keys(qSums).sort().forEach(function (cur) {
      qHtml += '<div class="country-row"><span>Total Value (' + cur + ')</span><span class="country-count">' + formatCurrency(qSums[cur], cur) + '</span></div>';
    });
    ['Pending', 'Approved', 'Rejected', 'Repeat'].forEach(function (st) {
      if (qStatusCounts[st]) {
        qHtml += '<div class="country-row"><span>' + st + '</span><span class="country-count">' + qStatusCounts[st] + '</span></div>';
      }
    });
    document.getElementById('quotation-summary').innerHTML = qHtml || '<div class="empty-state">No quotations yet.</div>';
  } catch (err) {
    document.getElementById('quotation-summary').innerHTML = '<div class="empty-state" style="color:var(--danger-dark)">Error loading quotations: ' + escapeHtml(err.message) + '</div>';
  }

  // Invoices summary
  try {
    const invoices = await invoicesPromise;
    const iSums = {};
    invoices.forEach(function (r) {
      const cur = r.currency || 'USD';
      if (!iSums[cur]) iSums[cur] = { value: 0, freight: 0, total: 0 };
      iSums[cur].value += Number(r.value) || 0;
      iSums[cur].freight += Number(r.freight) || 0;
      iSums[cur].total += Number(r.total) || (Number(r.value) || 0) + (Number(r.freight) || 0);
    });
    let iHtml = '<div class="country-row"><span>Total Invoices</span><span class="country-count">' + invoices.length + '</span></div>';
    Object.keys(iSums).sort().forEach(function (cur) {
      iHtml += '<div class="country-row"><span>Value Total (' + cur + ')</span><span class="country-count">' + formatCurrency(iSums[cur].value, cur) + '</span></div>';
      iHtml += '<div class="country-row"><span>Freight Total (' + cur + ')</span><span class="country-count">' + formatCurrency(iSums[cur].freight, cur) + '</span></div>';
      iHtml += '<div class="country-row"><span>Full Total (' + cur + ')</span><span class="country-count">' + formatCurrency(iSums[cur].total, cur) + '</span></div>';
    });
    document.getElementById('invoice-summary').innerHTML = iHtml || '<div class="empty-state">No invoices yet.</div>';
  } catch (err) {
    document.getElementById('invoice-summary').innerHTML = '<div class="empty-state" style="color:var(--danger-dark)">Error loading invoices: ' + escapeHtml(err.message) + '</div>';
  }

  // Purchase Orders summary
  try {
    const pos = await posPromise;
    const pSums = {};
    const pStatusCounts = {};
    pos.forEach(function (r) {
      const cur = r.currency || 'USD';
      pSums[cur] = (pSums[cur] || 0) + (Number(r.value) || 0);
      const st = r.status || 'Not delivered';
      pStatusCounts[st] = (pStatusCounts[st] || 0) + 1;
    });
    let pHtml = '<div class="country-row"><span>Total POs</span><span class="country-count">' + pos.length + '</span></div>';
    Object.keys(pSums).sort().forEach(function (cur) {
      pHtml += '<div class="country-row"><span>Total Value (' + cur + ')</span><span class="country-count">' + formatCurrency(pSums[cur], cur) + '</span></div>';
    });
    ['Not delivered', 'Partially delivered', 'Complete'].forEach(function (st) {
      if (pStatusCounts[st]) {
        pHtml += '<div class="country-row"><span>' + st + '</span><span class="country-count">' + pStatusCounts[st] + '</span></div>';
      }
    });
    document.getElementById('po-summary').innerHTML = pHtml || '<div class="empty-state">No purchase orders yet.</div>';
  } catch (err) {
    document.getElementById('po-summary').innerHTML = '<div class="empty-state" style="color:var(--danger-dark)">Error loading purchase orders: ' + escapeHtml(err.message) + '</div>';
  }
}

loadDashboard();
</script>
</body>
</html>
