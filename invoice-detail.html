<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Detail · Bark Ornament CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">
<style>
  :root { --ink: #0F2A47; --steel: #2E6096; --border: #E3E7ED; --muted: #6B7280; --text: #1F2937; --font-body: 'Inter', sans-serif; --font-head: 'Sora', 'Inter', sans-serif; }
  * { box-sizing: border-box; }
  body { font-family: var(--font-body); color: var(--text); margin: 0; background: #F4F6F9; }
  .sheet { max-width: 780px; margin: 30px auto; background: #fff; padding: 48px; border-radius: 10px; box-shadow: 0 1px 2px rgba(20,33,61,.06), 0 4px 16px rgba(20,33,61,.06); }
  .doc-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid var(--ink); padding-bottom: 20px; margin-bottom: 28px; }
  .doc-header .company-block { display: flex; align-items: center; gap: 12px; }
  .doc-header .company-logo { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .doc-header .company { font-family: var(--font-head); font-weight: 700; font-size: 20px; color: var(--ink); }
  .doc-header .address { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .doc-title { text-align: right; }
  .doc-title h1 { font-family: var(--font-head); font-size: 18px; margin: 0; color: var(--ink); }
  .doc-title .serial { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
  .section-title { font-family: var(--font-head); font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--steel); font-weight: 700; margin: 26px 0 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 28px; }
  .row { border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .row .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .02em; }
  .row .value { font-size: 14.5px; font-weight: 600; margin-top: 3px; }
  .value-highlight { font-size: 26px; font-family: var(--font-head); font-weight: 700; color: var(--ink); margin-top: 4px; }
  .actions { text-align: center; margin: 24px auto; max-width: 780px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--ink); font-weight: 600; cursor: pointer; text-decoration: none; font-size: 13.5px; }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .footer-note { text-align: center; font-size: 11.5px; color: var(--muted); margin-top: 30px; }
  @media print {
    .no-print { display: none !important; }
    body { background: #fff; }
    .sheet { box-shadow: none; margin: 0; max-width: 100%; }
  }
</style>
</head>
<body>

<div class="actions no-print">
  <a href="invoices.html" class="btn">&larr; Back to Invoices</a>
  <button class="btn primary" onclick="window.print()">Print / Save as PDF</button>
</div>

<div class="sheet" id="sheet">
  <div style="text-align:center;padding:60px;color:#6B7280;">Loading invoice…</div>
</div>

<script>
/**

 * The URL ends with /exec
 */
const API_URL = 'https://script.google.com/macros/s/AKfycbxFb-wqcSjnSsP_jPqv_6B1FG912MRO7G2keSJCSgGB6_-n4kQ3SU7OPBpGM7gqr1g/exec';

const COMPANY = {
  name: 'Bark Ornament Private Limited',
  address: 'No. 59A Bekkegama, Panadura'
};

const STATUS_OPTIONS = [
  'New Lead',
  'Existing Customer'
];

// Order reflects the sales pipeline, used for the funnel visual on the dashboard.
const STATUS_PIPELINE_ORDER = [
  'New Lead',
  'Existing Customer'
];

const STATUS_COLORS = {
  'New Lead': '#94A3B8',
  'Existing Customer': '#10B981'
};

// How this customer/lead first came in. "Other" reveals a free-text box
// so anything not on the list can still be captured.
const SOURCE_OPTIONS = [
  'WhatsApp',
  'Facebook',
  'Instagram',
  'Email',
  'Phone Call',
  'Website',
  'Referral',
  'Walk-in',
  'Other'
];

// Currencies offered on the Invoice / Quotation forms. Matches the
// currencies actually used across customer records (LKR for Local,
// USD for Maldives/Seychelles).
const CURRENCY_LIST = [
  { code: 'LKR', name: 'Sri Lankan Rupee' },
  { code: 'USD', name: 'US Dollar' }
];

// Must match QUOTATION_STATUSES in the Apps Script backend exactly.
const QUOTATION_STATUSES = ['Pending', 'Approved', 'Rejected', 'Repeat'];

/* ---------- Country / currency / serial-prefix configuration ----------
   Each country has a serial-number prefix (e.g. MAL-0001) and a currency.
   Defaults cover the current business segments; more can be added from
   the Add Customer form ("+ Add New Country") without touching code.
   NOTE: custom countries are stored in this browser's localStorage, so
   they are per-device for now — see chat notes on syncing this via the
   Apps Script backend if the whole team needs to see new countries. */

const DEFAULT_COUNTRIES = [
  { name: 'Maldives', prefix: 'MAL', currency: 'USD' },
  { name: 'Seychelles', prefix: 'SEY', currency: 'USD' },
  { name: 'Local', prefix: 'LOC', currency: 'LKR' }
];

const CountryConfig = {
  _key: 'bo_custom_countries',
  _customList() {
    try {
      const raw = localStorage.getItem(this._key);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  },
  getAll() {
    const map = {};
    DEFAULT_COUNTRIES.forEach(function (c) { map[c.name.toLowerCase()] = c; });
    this._customList().forEach(function (c) { map[c.name.toLowerCase()] = c; });
    return Object.values(map).sort(function (a, b) { return a.name.localeCompare(b.name); });
  },
  find(name) {
    const key = String(name || '').toLowerCase();
    return this.getAll().find(function (c) { return c.name.toLowerCase() === key; });
  },
  add(entry) {
    const name = (entry.name || '').trim();
    const prefix = (entry.prefix || '').trim().toUpperCase();
    const currency = (entry.currency || '').trim().toUpperCase();
    if (!name || !prefix || !currency) throw new Error('Country name, serial prefix, and currency are all required.');
    if (!/^[A-Z]{2,5}$/.test(prefix)) throw new Error('Prefix should be 2-5 letters, e.g. MAL, SEY, MAU.');
    if (!/^[A-Z]{3}$/.test(currency)) throw new Error('Currency should be a 3-letter code, e.g. USD, LKR.');
    const existing = this.getAll();
    if (existing.some(function (c) { return c.name.toLowerCase() === name.toLowerCase(); })) throw new Error('That country already exists.');
    if (existing.some(function (c) { return c.prefix.toLowerCase() === prefix.toLowerCase(); })) throw new Error('That serial prefix is already in use — pick a different one.');
    const list = this._customList();
    const record = { name: name, prefix: prefix, currency: currency };
    list.push(record);
    localStorage.setItem(this._key, JSON.stringify(list));
    return record;
  }
};

// Given the current customer list and a country's prefix, work out the next
// serial number in sequence, e.g. existing MAL-0001, MAL-0002 -> MAL-0003.
function nextSerialNo(customers, prefix) {
  let max = 0;
  (customers || []).forEach(function (c) {
    if (c.serialNo && c.serialNo.indexOf(prefix + '-') === 0) {
      const n = parseInt(c.serialNo.slice(prefix.length + 1), 10);
      if (!isNaN(n) && n > max) max = n;
    }
  });
  return prefix + '-' + String(max + 1).padStart(4, '0');
}

/* ============================================================
   Bark Ornament — Customer Management System
   Shared utilities: navigation shell, API calls, helpers
   ============================================================ */

/* ---------- Navigation shell ---------- */

function renderShell(activePage) {
  const session = Session.get();
  const isAdmin = !!session && session.role === 'admin';

  const nav = [
    { key: 'dashboard', label: 'Dashboard', href: 'index.html', icon: 'grid' },
    { key: 'register', label: 'Add Customer', href: 'register.html', icon: 'plus' },
    { key: 'customers', label: 'Customers', href: 'customers.html', icon: 'list' },
    { key: 'quotations', label: 'Quotations', href: 'quotations.html', icon: 'quote' },
    { key: 'invoices', label: 'Invoices', href: 'invoices.html', icon: 'invoice' }
  ];
  if (isAdmin) {
    nav.push({ key: 'team', label: 'Team Access', href: 'login.html', icon: 'team' });
  }

  const icons = {
    grid: '<path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>',
    plus: '<path d="M12 5v14M5 12h14"/>',
    list: '<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
    quote: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 15h6M9 11h3"/>',
    invoice: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 17h6M9 13h6"/>',
    team: '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>'
  };

  const navHtml = nav.map(function (item) {
    const active = item.key === activePage ? ' active' : '';
    return '<a class="nav-link' + active + '" href="' + item.href + '">' +
      '<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + icons[item.icon] + '</svg>' +
      '<span>' + item.label + '</span></a>';
  }).join('');

  const shell = document.getElementById('app-shell');
  shell.innerHTML =
    '<aside class="sidebar">' +
    '  <div class="brand">' +
    '    <div class="brand-mark"><img src="logo.png" alt="Bark Ornament logo"></div>' +
    '    <div class="brand-text">' +
    '      <div class="brand-name">Bark Ornament</div>' +
    '      <div class="brand-sub">Customer Management</div>' +
    '    </div>' +
    '  </div>' +
    '  <nav class="nav">' + navHtml + '</nav>' +
    '  <div class="sidebar-footer">' +
    (session ?
      '<div class="session-info"><strong>' + escapeHtml(session.email) + '</strong><br>' +
      (isAdmin ? 'Admin' : 'Team member') + ' &middot; <a href="#" id="logoutLink">Log out</a></div>' : '') +
    COMPANY.name + '<br>' + COMPANY.address +
    '</div>' +
    '</aside>' +
    '<div class="mobile-topbar">' +
    '  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">' +
    '    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>' +
    '  </button>' +
    '  <span class="brand-name">Bark Ornament</span>' +
    '</div>' +
    '<main class="main" id="main-content"></main>';

  const logoutLink = document.getElementById('logoutLink');
  if (logoutLink) {
    logoutLink.addEventListener('click', function (e) {
      e.preventDefault();
      Session.logout();
    });
  }

  const toggle = document.getElementById('menuToggle');
  if (toggle) {
    toggle.addEventListener('click', function () {
      document.querySelector('.sidebar').classList.toggle('open');
    });
  }
}

/* ---------- Toast notifications ---------- */

function showToast(message, type) {
  type = type || 'info';
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(function () { toast.classList.add('show'); });
  setTimeout(function () {
    toast.classList.remove('show');
    setTimeout(function () { toast.remove(); }, 300);
  }, 3200);
}

/* ---------- Session / auth ----------
   Login is required to use this app. A logged-in session (email, role,
   signed token, expiry) is cached in localStorage so people stay signed
   in across visits until the token expires (server-side, default 12h)
   or they log out. The role check here only controls what UI is shown —
   the real security boundary is the token check the backend does on
   every add/update/delete request. */
const Session = {
  _key: 'bo_session',
  get() {
    try {
      const raw = localStorage.getItem(this._key);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !s.token || !s.exp || Date.now() > s.exp) { this.clear(); return null; }
      return s;
    } catch (e) { return null; }
  },
  set(s) { try { localStorage.setItem(this._key, JSON.stringify(s)); } catch (e) { /* ignore */ } },
  clear() { try { localStorage.removeItem(this._key); } catch (e) { /* ignore */ } },
  isAdmin() { const s = this.get(); return !!s && s.role === 'admin'; },
  /** Redirects to login.html if there's no valid session; returns the session otherwise. */
  requireLogin() {
    const s = this.get();
    if (!s) {
      const here = encodeURIComponent(location.pathname.split('/').pop() + location.search);
      window.location.href = 'login.html?redirect=' + here;
      return null;
    }
    return s;
  },
  logout() {
    this.clear();
    window.location.href = 'login.html';
  }
};

/* ---------- API layer ---------- */

const Api = {
  async getCustomers() {
    if (!API_URL || API_URL.indexOf('PASTE_YOUR') === 0) {
      throw new Error('API_URL is not configured.');
    }
    const s = Session.get();
    const url = API_URL + '?token=' + encodeURIComponent(s ? s.token : '');
    const res = await fetch(url, { method: 'GET' });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || 'Failed to load customers'); }
    return json.data;
  },

  async addCustomer(data) {
    return this._post({ action: 'add', data: data });
  },

  async updateCustomer(data) {
    return this._post({ action: 'update', data: data });
  },

  async deleteCustomer(serialNo) {
    return this._post({ action: 'delete', serialNo: serialNo });
  },

  async getQuotations() {
    return this._get('quotations');
  },

  async addQuotation(data) {
    return this._post({ action: 'addQuotation', data: data });
  },

  async updateQuotation(data) {
    return this._post({ action: 'updateQuotation', data: data });
  },

  async deleteQuotation(quotationNo) {
    return this._post({ action: 'deleteQuotation', quotationNo: quotationNo });
  },

  async getInvoices() {
    return this._get('invoices');
  },

  async addInvoice(data) {
    return this._post({ action: 'addInvoice', data: data });
  },

  async updateInvoice(data) {
    return this._post({ action: 'updateInvoice', data: data });
  },

  async deleteInvoice(invoiceNo) {
    return this._post({ action: 'deleteInvoice', invoiceNo: invoiceNo });
  },

  async _get(action) {
    const s = Session.get();
    const url = API_URL + '?action=' + encodeURIComponent(action) + '&token=' + encodeURIComponent(s ? s.token : '');
    const res = await fetch(url, { method: 'GET' });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || ('Failed to load ' + action)); }
    return json.data;
  },

  async _post(body) {
    const s = Session.get();
    body.token = s ? s.token : '';
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || 'Request failed'); }
    return json.data;
  }
};

/** If the backend rejected a call because the session is invalid/expired or
 *  the action needed admin rights, act accordingly instead of just showing
 *  a raw error string. */
function handleAuthError(errorCode) {
  if (errorCode === 'AUTH_REQUIRED') {
    Session.clear();
    showToast('Your session has expired — please log in again.', 'error');
    setTimeout(function () { window.location.href = 'login.html'; }, 1200);
  }
}

/* ---------- Formatting helpers ---------- */

function formatCurrency(value, currency) {
  const num = Number(value) || 0;
  return (currency || 'USD') + ' ' + num.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function formatDate(value) {
  if (!value) return '—';
  const d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function statusBadge(status) {
  const color = STATUS_COLORS[status] || '#9CA3AF';
  return '<span class="status-badge" style="--badge-color:' + color + '">' +
    '<span class="status-dot"></span>' + status + '</span>';
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ---------- Simple client-side cache shared across pages in one session ---------- */

const CustomerStore = {
  _data: null,
  async load(force) {
    if (this._data && !force) return this._data;
    this._data = await Api.getCustomers();
    return this._data;
  },
  invalidate() { this._data = null; }
};

const QuotationStore = {
  _data: null,
  async load(force) {
    if (this._data && !force) return this._data;
    this._data = await Api.getQuotations();
    return this._data;
  },
  invalidate() { this._data = null; }
};

const InvoiceStore = {
  _data: null,
  async load(force) {
    if (this._data && !force) return this._data;
    this._data = await Api.getInvoices();
    return this._data;
  },
  invalidate() { this._data = null; }
};

</script>
<script>
const params = new URLSearchParams(window.location.search);
const invoiceNo = params.get('id');

function row(label, value) {
  return '<div class="row"><div class="label">' + label + '</div><div class="value">' + (value || '—') + '</div></div>';
}

async function load() {
  const sheetEl = document.getElementById('sheet');
  if (!invoiceNo) { sheetEl.innerHTML = '<p>No invoice specified.</p>'; return; }
  try {
    const invoices = await InvoiceStore.load();
    const inv = invoices.find(x => x.invoiceNo === invoiceNo);
    if (!inv) { sheetEl.innerHTML = '<p>Invoice not found.</p>'; return; }

    sheetEl.innerHTML =
      '<div class="doc-header">' +
      '  <div class="company-block"><img class="company-logo" src="logo.png" alt="Bark Ornament logo"><div><div class="company">' + escapeHtml(COMPANY.name) + '</div><div class="address">' + escapeHtml(COMPANY.address) + '</div></div></div>' +
      '  <div class="doc-title"><h1>Invoice Summary</h1><div class="serial">' + escapeHtml(inv.invoiceNo) + '</div></div>' +
      '</div>' +

      '<div class="grid">' +
      row('Customer', escapeHtml(inv.customerName)) +
      row('Invoice Date', formatDate(inv.invoiceDate)) +
      row('Responsible Person', escapeHtml(inv.responsiblePerson)) +
      '</div>' +

      '<div class="section-title">Value</div>' +
      '<div class="value-highlight">' + formatCurrency(inv.value, inv.currency) + '</div>' +

      '<div class="footer-note">Generated on ' + formatDate(new Date()) + ' — ' + escapeHtml(COMPANY.name) + '</div>';
  } catch (err) {
    sheetEl.innerHTML = '<p style="color:#C0392B">Error loading invoice: ' + escapeHtml(err.message) + '</p>';
  }
}

load();
</script>
