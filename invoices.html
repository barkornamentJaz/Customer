<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root {
  --ink: #0F2A47; --steel: #2E6096; --steel-dark: #1F4670; --canvas: #F4F6F9; --card: #FFFFFF;

}
* { box-sizing: border-box; }
html, body { height: 100%; }
body { margin: 0; font-family: var(--font-body); background: var(--canvas); color: var(--text); font-size: 14.5px; line-height: 1.5; }

button, input, select, textarea { font-family: inherit; font-size: inherit; }
#app-shell { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--ink); color: #E7EBF3; display: flex; flex-direction: column; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
.brand { display: flex; align-items: center; gap: 12px; padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.brand-mark { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #fff; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(255,255,255,0.15); }
.brand-mark img { width: 100%; height: 100%; object-fit: cover; display: block; }
.brand-name { font-family: var(--font-head); font-weight: 600; font-size: 15px; color: #fff; }
.brand-sub { font-size: 11.5px; color: #9BA9C4; margin-top: 2px; }
.nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-link { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; color: #C4CDE0; font-size: 14px; font-weight: 500; transition: background 0.15s, color 0.15s; }
.nav-link:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-link.active { background: var(--steel); color: #fff; font-weight: 600; }
.nav-icon { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-footer { padding: 16px 20px 22px; font-size: 11px; color: #7C8AA8; border-top: 1px solid rgba(255,255,255,0.08); line-height: 1.5; }
.session-info { font-size: 12px; color: #C7D0E0; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }

.main { flex: 1; padding: 32px 36px; max-width: 1400px; width: 100%; }

.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; border: 1px solid transparent; font-weight: 600; font-size: 13.5px; cursor: pointer; transition: transform 0.1s, box-shadow 0.15s, background 0.15s; white-space: nowrap; }

.btn-accent { background: var(--steel); color: #fff; }

.search-box input { width: 100%; padding: 10px 34px 10px 36px; border: 1px solid var(--border); border-radius: 8px; }

<script>

// Currencies offered on the Invoice / Quotation forms. Matches the
// currencies actually used across customer records (LKR for Local,
// USD for Maldives/Seychelles).
const CURRENCY_LIST = [
  { code: 'LKR', name: 'Sri Lankan Rupee' },
  { code: 'USD', name: 'US Dollar' }
];

// Must match QUOTATION_STATUSES in the Apps Script backend exactly.
const QUOTATION_STATUSES = ['Pending', 'Approved', 'Rejected', 'Repeat'];

/* ---------- Country / currency / serial-prefix configuration ----------
   Each country has a serial-number prefix (e.g. MAL-0001) and a currency.
   Defaults cover the current business segments; more can be added from
   the Add Customer form ("+ Add New Country") without touching code.
   NOTE: custom countries are stored in this browser's localStorage, so
   they are per-device for now — see chat notes on syncing this via the
   Apps Script backend if the whole team needs to see new countries. */

const DEFAULT_COUNTRIES = [
  { name: 'Maldives', prefix: 'MAL', currency: 'USD' },
  { name: 'Seychelles', prefix: 'SEY', currency: 'USD' },
  { name: 'Local', prefix: 'LOC', currency: 'LKR' }
];

const CountryConfig = {
  _key: 'bo_custom_countries',
  _customList() {
    try {
      const raw = localStorage.getItem(this._key);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  },
  getAll() {
    const map = {};
    DEFAULT_COUNTRIES.forEach(function (c) { map[c.name.toLowerCase()] = c; });
    this._customList().forEach(function (c) { map[c.name.toLowerCase()] = c; });
    return Object.values(map).sort(function (a, b) { return a.name.localeCompare(b.name); });
  },
  find(name) {
    const key = String(name || '').toLowerCase();
    return this.getAll().find(function (c) { return c.name.toLowerCase() === key; });
  },
  add(entry) {
    const name = (entry.name || '').trim();
    const prefix = (entry.prefix || '').trim().toUpperCase();
    const currency = (entry.currency || '').trim().toUpperCase();
    if (!name || !prefix || !currency) throw new Error('Country name, serial prefix, and currency are all required.');
    if (!/^[A-Z]{2,5}$/.test(prefix)) throw new Error('Prefix should be 2-5 letters, e.g. MAL, SEY, MAU.');
    if (!/^[A-Z]{3}$/.test(currency)) throw new Error('Currency should be a 3-letter code, e.g. USD, LKR.');
    const existing = this.getAll();
    if (existing.some(function (c) { return c.name.toLowerCase() === name.toLowerCase(); })) throw new Error('That country already exists.');
    if (existing.some(function (c) { return c.prefix.toLowerCase() === prefix.toLowerCase(); })) throw new Error('That serial prefix is already in use — pick a different one.');
    const list = this._customList();
    const record = { name: name, prefix: prefix, currency: currency };
    list.push(record);
    localStorage.setItem(this._key, JSON.stringify(list));
    return record;
  }
};

// Given the current customer list and a country's prefix, work out the next
// serial number in sequence, e.g. existing MAL-0001, MAL-0002 -> MAL-0003.
function nextSerialNo(customers, prefix) {
  let max = 0;
  (customers || []).forEach(function (c) {
    if (c.serialNo && c.serialNo.indexOf(prefix + '-') === 0) {
      const n = parseInt(c.serialNo.slice(prefix.length + 1), 10);
      if (!isNaN(n) && n > max) max = n;
    }
  });
  return prefix + '-' + String(max + 1).padStart(4, '0');
}

/* ---------- Navigation shell ---------- */

/* ---------- Toast notifications ---------- */

function showToast(message, type) {
  type = type || 'info';
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(function () { toast.classList.add('show'); });
  setTimeout(function () {
    toast.classList.remove('show');
    setTimeout(function () { toast.remove(); }, 300);
  }, 3200);
}

/* ---------- Session / auth ----------
   Login is required to use this app. A logged-in session (email, role,
   signed token, expiry) is cached in localStorage so people stay signed
   in across visits until the token expires (server-side, default 12h)
   or they log out. The role check here only controls what UI is shown —
   the real security boundary is the token check the backend does on
   every add/update/delete request. */
const Session = {
  _key: 'bo_session',
  get() {
    try {
      const raw = localStorage.getItem(this._key);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !s.token || !s.exp || Date.now() > s.exp) { this.clear(); return null; }
      return s;
    } catch (e) { return null; }
  },
  set(s) { try { localStorage.setItem(this._key, JSON.stringify(s)); } catch (e) { /* ignore */ } },
  clear() { try { localStorage.removeItem(this._key); } catch (e) { /* ignore */ } },
  isAdmin() { const s = this.get(); return !!s && s.role === 'admin'; },
  /** Redirects to login.html if there's no valid session; returns the session otherwise. */
  requireLogin() {
    const s = this.get();
    if (!s) {
      const here = encodeURIComponent(location.pathname.split('/').pop() + location.search);
      window.location.href = 'login.html?redirect=' + here;
      return null;
    }
    return s;
  },
  logout() {
    this.clear();
    window.location.href = 'login.html';
  }
};

/* ---------- API layer ---------- */

const Api = {
  async getCustomers() {
    if (!API_URL || API_URL.indexOf('PASTE_YOUR') === 0) {
      throw new Error('API_URL is not configured.');
    }
    const s = Session.get();
    const url = API_URL + '?token=' + encodeURIComponent(s ? s.token : '');
    const res = await fetch(url, { method: 'GET' });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || 'Failed to load customers'); }
    return json.data;
  },

  async addCustomer(data) {
    return this._post({ action: 'add', data: data });
  },

  async updateCustomer(data) {
    return this._post({ action: 'update', data: data });
  },

  async deleteCustomer(serialNo) {
    return this._post({ action: 'delete', serialNo: serialNo });
  },

  async getQuotations() {
    return this._get('quotations');
  },

  async addQuotation(data) {
    return this._post({ action: 'addQuotation', data: data });
  },

  async updateQuotation(data) {
    return this._post({ action: 'updateQuotation', data: data });
  },

  async deleteQuotation(quotationNo) {
    return this._post({ action: 'deleteQuotation', quotationNo: quotationNo });
  },

  async getInvoices() {
    return this._get('invoices');
  },

  async addInvoice(data) {
    return this._post({ action: 'addInvoice', data: data });
  },

  async updateInvoice(data) {
    return this._post({ action: 'updateInvoice', data: data });
  },

  async deleteInvoice(invoiceNo) {
    return this._post({ action: 'deleteInvoice', invoiceNo: invoiceNo });
  },

  async _get(action) {
    const s = Session.get();
    const url = API_URL + '?action=' + encodeURIComponent(action) + '&token=' + encodeURIComponent(s ? s.token : '');
    const res = await fetch(url, { method: 'GET' });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || ('Failed to load ' + action)); }
    return json.data;
  },

  async _post(body) {
    const s = Session.get();
    body.token = s ? s.token : '';
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || 'Request failed'); }
    return json.data;
  }
};

/** If the backend rejected a call because the session is invalid/expired or
 *  the action needed admin rights, act accordingly instead of just showing
 *  a raw error string. */
function handleAuthError(errorCode) {
  if (errorCode === 'AUTH_REQUIRED') {
    Session.clear();
    showToast('Your session has expired — please log in again.', 'error');
    setTimeout(function () { window.location.href = 'login.html'; }, 1200);
  }
}

/* ---------- Formatting helpers ---------- */

function formatCurrency(value, currency) {
  const num = Number(value) || 0;
  return (currency || 'USD') + ' ' + num.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function formatDate(value) {
  if (!value) return '—';
  const d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function statusBadge(status) {
  const color = STATUS_COLORS[status] || '#9CA3AF';
  return '<span class="status-badge" style="--badge-color:' + color + '">' +
    '<span class="status-dot"></span>' + status + '</span>';
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ---------- Simple client-side cache shared across pages in one session ---------- */

const CustomerStore = {
  _data: null,
  async load(force) {
    if (this._data && !force) return this._data;
    this._data = await Api.getCustomers();
    return this._data;
  },
  invalidate() { this._data = null; }
};

const QuotationStore = {
  _data: null,
  async load(force) {
    if (this._data && !force) return this._data;
    this._data = await Api.getQuotations();
    return this._data;
  },
  invalidate() { this._data = null; }
};

const InvoiceStore = {
  _data: null,
  async load(force) {
    if (this._data && !force) return this._data;
    this._data = await Api.getInvoices();
    return this._data;
  },
  invalidate() { this._data = null; }
};

</script>
<script>
const currentSession = Session.requireLogin();
if (!currentSession) { throw new Error('Redirecting to login…'); }

renderShell('invoices');

const mainEl = document.getElementById('main-content');
mainEl.innerHTML =
  '<div class="page-header">' +
  '  <div><h1>Invoices</h1><p>Search, filter, and manage all invoices.</p></div>' +
  '  <div style="display:flex;gap:10px;flex-wrap:wrap">' +
  '    <button class="btn btn-outline" id="printBtn">' +
  '      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>' +
  '      Print / Save as PDF' +
  '    </button>' +
  '    <button class="btn btn-outline" id="exportBtn">' +
  '      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>' +
  '      Export to Excel' +
  '    </button>' +
  '    <a href="add-invoice.html" class="btn btn-accent">' +
  '      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>' +
  '      Add Invoice' +
  '    </a>' +
  '  </div>' +
  '</div>' +

  '<div class="card">' +
  '  <div class="table-toolbar">' +
  '    <div class="search-box">' +
  '      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>' +
  '      <input type="text" id="searchInput" placeholder="Search by invoice no or customer…">' +
  '      <button type="button" class="search-clear" id="searchClearBtn" title="Clear search" aria-label="Clear search">' +
  '        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>' +
  '      </button>' +
  '    </div>' +
  '    <select id="filterCustomer"><option value="">All Customers</option></select>' +
  '    <span class="date-filter-label">From</span>' +
  '    <input type="date" id="filterDateFrom">' +
  '    <span class="date-filter-label">To</span>' +
  '    <input type="date" id="filterDateTo">' +
  '    <select id="filterCurrency"><option value="">All Currencies</option></select>' +
  '    <select id="filterResponsible"><option value="">All Responsible Persons</option></select>' +
  '    <button type="button" class="btn btn-outline btn-sm" id="clearFiltersBtn">Clear Filters</button>' +
  '  </div>' +
  '  <div class="totals-bar" id="totalsBar"></div>' +
  '  <div class="table-wrap">' +
  '    <table class="data-table">' +
  '      <thead><tr>' +
  '        <th>Date</th><th>Invoice No</th><th>Customer</th><th>Value</th><th>Freight</th><th>Total</th><th>Responsible Person</th><th></th>' +
  '      </tr></thead>' +
  '      <tbody id="tableBody"><tr><td colspan="8" class="loading-row"><div class="spinner"></div>Loading invoices…</td></tr></tbody>' +
  '    </table>' +
  '  </div>' +
  '</div>';

let allInvoices = [];
let filtered = [];
let pendingDelete = null;

function dateInRange(value, from, to) {
  if (!value) return !from && !to;
  const d = new Date(value);
  if (isNaN(d.getTime())) return !from && !to;
  const dayStr = d.toISOString().slice(0, 10);
  if (from && dayStr < from) return false;
  if (to && dayStr > to) return false;
  return true;
}

function populateFilterOptions() {
  function uniqueSorted(key) { return [...new Set(allInvoices.map(i => i[key]).filter(Boolean))].sort(); }
  const customerSel = document.getElementById('filterCustomer');
  const currencySel = document.getElementById('filterCurrency');
  const responsibleSel = document.getElementById('filterResponsible');
  uniqueSorted('customerName').forEach(v => customerSel.insertAdjacentHTML('beforeend', '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>'));
  uniqueSorted('currency').forEach(v => currencySel.insertAdjacentHTML('beforeend', '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>'));
  uniqueSorted('responsiblePerson').forEach(v => responsibleSel.insertAdjacentHTML('beforeend', '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>'));
}

function applyFilters() {
  const searchInput = document.getElementById('searchInput');
  const q = searchInput.value.trim().toLowerCase();
  const customer = document.getElementById('filterCustomer').value;
  const dateFrom = document.getElementById('filterDateFrom').value;
  const dateTo = document.getElementById('filterDateTo').value;
  const currency = document.getElementById('filterCurrency').value;
  const responsible = document.getElementById('filterResponsible').value;
  document.getElementById('searchClearBtn').classList.toggle('show', q.length > 0);
  const qWords = q.split(/\s+/).filter(Boolean);

  filtered = allInvoices.filter(function (r) {
    const haystack = [r.invoiceNo, r.customerName, r.responsiblePerson].filter(Boolean).join(' ').toLowerCase();
    const matchesQ = qWords.length === 0 || qWords.every(w => haystack.includes(w));
    const matchesCustomer = !customer || r.customerName === customer;
    const matchesDate = (!dateFrom && !dateTo) || dateInRange(r.invoiceDate, dateFrom, dateTo);
    const matchesCurrency = !currency || r.currency === currency;
    const matchesResponsible = !responsible || r.responsiblePerson === responsible;
    return matchesQ && matchesCustomer && matchesDate && matchesCurrency && matchesResponsible;
  });
  renderTable();
  renderTotals();
}

function renderTotals() {
  const bar = document.getElementById('totalsBar');
  if (!filtered.length) { bar.innerHTML = ''; return; }
  const sums = {};
  filtered.forEach(function (r) {
    const cur = r.currency || 'USD';
    if (!sums[cur]) sums[cur] = { value: 0, freight: 0, total: 0 };
    const value = Number(r.value) || 0;
    const freight = Number(r.freight) || 0;
    sums[cur].value += value;
    sums[cur].freight += freight;
    sums[cur].total += (r.total !== undefined && r.total !== '' && r.total !== null) ? Number(r.total) : value + freight;
  });
  const parts = Object.keys(sums).sort().map(function (cur) {
    return '<strong>' + cur + '</strong> Value: <strong>' + formatCurrency(sums[cur].value, cur) + '</strong>' +
      ' &nbsp;·&nbsp; Freight: <strong>' + formatCurrency(sums[cur].freight, cur) + '</strong>' +
      ' &nbsp;·&nbsp; Total: <strong>' + formatCurrency(sums[cur].total, cur) + '</strong>';
  });
  bar.innerHTML = 'Totals (' + filtered.length + (filtered.length === 1 ? ' invoice' : ' invoices') + '): ' + parts.join(' &nbsp;&nbsp;|&nbsp;&nbsp; ');
}

function clearAllFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterCustomer').value = '';
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  document.getElementById('filterCurrency').value = '';
  document.getElementById('filterResponsible').value = '';
  applyFilters();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>' +
      '<div>No invoices match your search or filters.</div></div></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(function (r) {
    const value = Number(r.value) || 0;
    const freight = Number(r.freight) || 0;
    const total = (r.total !== undefined && r.total !== '' && r.total !== null) ? Number(r.total) : value + freight;
    return '<tr>' +
      '<td>' + formatDate(r.invoiceDate) + '</td>' +
      '<td><strong>' + escapeHtml(r.invoiceNo) + '</strong></td>' +
      '<td>' + escapeHtml(r.customerName) + '</td>' +
      '<td>' + formatCurrency(value, r.currency) + '</td>' +
      '<td>' + formatCurrency(freight, r.currency) + '</td>' +
      '<td>' + formatCurrency(total, r.currency) + '</td>' +
      '<td>' + escapeHtml(r.responsiblePerson) + '</td>' +
      '<td><div class="row-actions">' +
      (currentSession.role === 'admin' ? '  <a class="btn btn-outline btn-sm" href="add-invoice.html?edit=' + encodeURIComponent(r.invoiceNo) + '" title="Edit">Edit</a>' : '') +
      '  <a class="btn btn-outline btn-sm" href="invoice-detail.html?id=' + encodeURIComponent(r.invoiceNo) + '" title="Print">Print</a>' +
      (currentSession.role === 'admin' ? '  <button class="btn btn-danger btn-sm" data-delete="' + escapeHtml(r.invoiceNo) + '" title="Delete">Delete</button>' : '') +
      '</div></td>' +
      '</tr>';
  }).join('');

  tbody.querySelectorAll('[data-delete]').forEach(function (btn) {
    btn.addEventListener('click', function () { confirmDelete(btn.getAttribute('data-delete')); });
  });
  updateScrollHint();
}

function updateScrollHint() {
  const wrap = document.querySelector('.table-wrap');
  if (!wrap) return;
  if (wrap.scrollWidth > wrap.clientWidth + 4) wrap.classList.add('has-more');
  else wrap.classList.remove('has-more');
}
window.addEventListener('resize', updateScrollHint);

function confirmDelete(invoiceNo) {
  pendingDelete = invoiceNo;
  const record = allInvoices.find(r => r.invoiceNo === invoiceNo);
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML =
    '<div class="modal">' +
    '  <h3>Delete invoice?</h3>' +
    '  <p>This will permanently remove <strong>' + escapeHtml(invoiceNo) + '</strong>' + (record ? ' (' + escapeHtml(record.customerName) + ')' : '') + ' from the sheet. This cannot be undone.</p>' +
    '  <div class="modal-actions">' +
    '    <button class="btn btn-outline" id="cancelDelete">Cancel</button>' +
    '    <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>' +
    '  </div>' +
    '</div>';
  document.body.appendChild(backdrop);
  document.getElementById('cancelDelete').addEventListener('click', function () { backdrop.remove(); });
  backdrop.addEventListener('click', function (e) { if (e.target === backdrop) backdrop.remove(); });
  document.getElementById('confirmDeleteBtn').addEventListener('click', async function () {
    const btn = document.getElementById('confirmDeleteBtn');
    btn.disabled = true; btn.textContent = 'Deleting…';
    try {
      await Api.deleteInvoice(pendingDelete);
      showToast('Invoice deleted.', 'success');
      InvoiceStore.invalidate();
      backdrop.remove();
      await loadInvoices();
    } catch (err) {
      showToast('Error deleting: ' + err.message, 'error');
      btn.disabled = false; btn.textContent = 'Delete';
    }
  });
}

function exportToExcel() {
  if (filtered.length === 0) { showToast('No records to export.', 'error'); return; }
  const rows = filtered.map(function (r) {
    const value = Number(r.value) || 0;
    const freight = Number(r.freight) || 0;
    const total = (r.total !== undefined && r.total !== '' && r.total !== null) ? Number(r.total) : value + freight;
    return { 'Date': formatDate(r.invoiceDate), 'Invoice No': r.invoiceNo, 'Customer': r.customerName, 'Value': value, 'Freight': freight, 'Total': total, 'Currency': r.currency, 'Responsible Person': r.responsiblePerson };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Invoices');
  XLSX.writeFile(wb, 'Bark_Ornament_Invoices_' + new Date().toISOString().slice(0, 10) + '.xlsx');
}

async function loadInvoices(force) {
  const tbody = document.getElementById('tableBody');
  try {
    allInvoices = await InvoiceStore.load(force);
    if (document.getElementById('filterCurrency').children.length === 1) populateFilterOptions();
    applyFilters();
  } catch (err) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state" style="color:var(--danger-dark)">Error loading data: ' + escapeHtml(err.message) + '</div></td></tr>';
  }
}

function activeFilterSummary() {
  const parts = [];
  const customer = document.getElementById('filterCustomer').value;
  const dateFrom = document.getElementById('filterDateFrom').value;
  const dateTo = document.getElementById('filterDateTo').value;
  const currency = document.getElementById('filterCurrency').value;
  const responsible = document.getElementById('filterResponsible').value;
  const q = document.getElementById('searchInput').value.trim();
  if (customer) parts.push('Customer: ' + customer);
  if (dateFrom || dateTo) parts.push('Date: ' + (dateFrom || '\u2026') + ' to ' + (dateTo || '\u2026'));
  if (currency) parts.push('Currency: ' + currency);
  if (responsible) parts.push('Responsible: ' + responsible);
  if (q) parts.push('Search: "' + q + '"');
  return parts.length ? parts.join('  \u00b7  ') : 'All invoices';
}

function generatePrintReport() {
  if (filtered.length === 0) { showToast('No records to print — adjust your filters first.', 'error'); return; }
  const rowsHtml = filtered.map(function (r) {
    const value = Number(r.value) || 0;
    const freight = Number(r.freight) || 0;
    const total = (r.total !== undefined && r.total !== '' && r.total !== null) ? Number(r.total) : value + freight;
    return '<tr>' +
      '<td>' + formatDate(r.invoiceDate) + '</td>' +
      '<td>' + escapeHtml(r.invoiceNo) + '</td>' +
      '<td>' + escapeHtml(r.customerName) + '</td>' +
      '<td>' + formatCurrency(value, r.currency) + '</td>' +
      '<td>' + formatCurrency(freight, r.currency) + '</td>' +
      '<td>' + formatCurrency(total, r.currency) + '</td>' +
      '<td>' + escapeHtml(r.responsiblePerson) + '</td>' +
      '</tr>';
  }).join('');

  const sums = {};
  filtered.forEach(function (r) {
    const cur = r.currency || 'USD';
    if (!sums[cur]) sums[cur] = { value: 0, freight: 0, total: 0 };
    const value = Number(r.value) || 0;
    const freight = Number(r.freight) || 0;
    sums[cur].value += value;
    sums[cur].freight += freight;
    sums[cur].total += (r.total !== undefined && r.total !== '' && r.total !== null) ? Number(r.total) : value + freight;
  });
  const totalsHtml = Object.keys(sums).sort().map(function (cur) {
    return '<tr class="totals-row"><td colspan="3" style="text-align:right;"><strong>Total (' + escapeHtml(cur) + ')</strong></td>' +
      '<td><strong>' + formatCurrency(sums[cur].value, cur) + '</strong></td>' +
      '<td><strong>' + formatCurrency(sums[cur].freight, cur) + '</strong></td>' +
      '<td><strong>' + formatCurrency(sums[cur].total, cur) + '</strong></td>' +
      '<td></td></tr>';
  }).join('');

  document.getElementById('printReport').innerHTML =
    '<div class="report-header">' +
    '  <div class="company-block"><img class="company-logo" src="logo.png" alt="Bark Ornament logo"><div><div class="company">' + escapeHtml(COMPANY.name) + '</div><div class="address">' + escapeHtml(COMPANY.address) + '</div></div></div>' +
    '  <div class="report-title"><h1>Invoice Report</h1><div class="meta">' + escapeHtml(activeFilterSummary()) + '</div>' +
    '  <div class="meta">' + filtered.length + ' record' + (filtered.length === 1 ? '' : 's') + '</div></div>' +
    '</div>' +
    '<table><thead><tr><th>Date</th><th>Invoice No</th><th>Customer</th><th>Value</th><th>Freight</th><th>Total</th><th>Responsible</th></tr></thead>' +
    '<tbody>' + rowsHtml + totalsHtml + '</tbody></table>' +
    '<div class="report-footer">Generated on ' + formatDate(new Date()) + ' — ' + escapeHtml(COMPANY.name) + '</div>';

  window.print();
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('searchClearBtn').addEventListener('click', function () {
  const input = document.getElementById('searchInput');
  input.value = ''; applyFilters(); input.focus();
});
document.getElementById('clearFiltersBtn').addEventListener('click', clearAllFilters);
document.getElementById('filterCustomer').addEventListener('change', applyFilters);
document.getElementById('filterDateFrom').addEventListener('change', applyFilters);
document.getElementById('filterDateTo').addEventListener('change', applyFilters);
document.getElementById('filterCurrency').addEventListener('change', applyFilters);
document.getElementById('filterResponsible').addEventListener('change', applyFilters);
document.getElementById('exportBtn').addEventListener('click', exportToExcel);
document.getElementById('printBtn').addEventListener('click', generatePrintReport);

loadInvoices();
</script>
</body>
</html>
