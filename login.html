<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In · Bark Ornament CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">
<style>
:root {
  --ink: #0F2A47;
  --ink-light: #1B3A5C;
  --steel: #2E6096;
  --steel-dark: #1F4670;
  --canvas: #F4F6F9;
  --card: #FFFFFF;
  --text: #1F2937;
  --muted: #6B7280;
  --border: #E3E7ED;
  --danger: #EF4444;
  --danger-dark: #C0392B;
  --success: #10B981;
  --radius: 10px;
  --shadow: 0 1px 2px rgba(20, 33, 61, 0.06), 0 4px 16px rgba(20, 33, 61, 0.06);
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-head: 'Sora', 'Inter', sans-serif;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: linear-gradient(160deg, var(--ink) 0%, var(--ink-light) 45%, var(--steel) 100%);
  color: var(--text);
  font-size: 14.5px;
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
h1, h2, h3 { font-family: var(--font-head); margin: 0; color: var(--ink); }
button, input, select { font-family: inherit; font-size: inherit; }
a { color: var(--steel); }

.auth-wrap { width: 100%; max-width: 400px; }
.brand-row { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 22px; }
.brand-row img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
.brand-row .brand-text { color: #fff; text-align: left; }
.brand-row .brand-name { font-family: var(--font-head); font-weight: 700; font-size: 18px; }
.brand-row .brand-sub { font-size: 12px; color: #C7D0E0; }

.card {
  background: var(--card);
  border-radius: 14px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);
  padding: 32px 30px;
}
.card h2 { font-size: 19px; margin-bottom: 6px; }
.card .sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.field input {
  width: 100%; padding: 11px 13px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 14.5px; outline: none; transition: border-color .15s;
}
.field input:focus { border-color: var(--steel); }
.field .hint { font-size: 11.5px; color: var(--muted); margin-top: 5px; }

.btn {
  width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--ink);
  color: #fff; font-weight: 600; font-size: 14.5px; cursor: pointer; transition: background .15s;
}
.btn:hover { background: var(--steel-dark); }
.btn:disabled { opacity: .6; cursor: not-allowed; }
.btn-outline { background: #fff; color: var(--ink); border: 1px solid var(--border); }
.btn-outline:hover { background: #F4F6F9; }
.btn-danger { background: #FDECEC; color: var(--danger-dark); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { width: auto; padding: 7px 12px; font-size: 13px; }

.row-gap { display: flex; gap: 10px; }
.row-gap .btn { flex: 1; }

.msg { font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-bottom: 16px; }
.msg-error { background: #FDECEC; color: var(--danger-dark); }
.msg-info { background: #E4EDF6; color: #1F4670; }
.msg-success { background: #E7F7EF; color: #0D7A4E; }

.back-link { display: inline-block; font-size: 13px; color: var(--muted); margin-bottom: 14px; cursor: pointer; text-decoration: none; }
.back-link:hover { color: var(--ink); }

.user-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 4px; border-bottom: 1px solid var(--border); font-size: 13.5px;
}
.user-row:last-child { border-bottom: none; }
.role-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #E4EDF6; color: #1F4670; font-weight: 600; margin-left: 6px; }
.role-tag.admin { background: #FEF3E0; color: #A15C00; }
.status-tag { font-size: 11px; color: var(--muted); }

.divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--ink); color: #fff; padding: 11px 16px; border-radius: 8px; font-size: 13.5px; box-shadow: var(--shadow); opacity: 0; transform: translateY(-8px); transition: all .25s; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast-error { background: var(--danger-dark); }
.toast-success { background: #0D7A4E; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="brand-row">
    <img src="logo.png" alt="Bark Ornament logo">
    <div class="brand-text">
      <div class="brand-name">Bark Ornament</div>
      <div class="brand-sub">Customer Management</div>
    </div>
  </div>
  <div class="card" id="authCard"></div>
</div>

<script>
/* Same deployed Apps Script Web App URL used across the app. */
const API_URL = 'https://script.google.com/macros/s/AKfycbxFb-wqcSjnSsP_jPqv_6B1FG912MRO7G2keSJCSgGB6_-n4kQ3SU7OPBpGM7gqr1g/exec';

const COMPANY = { name: 'Bark Ornament Private Limited', address: 'No. 59A Bekkegama, Panadura' };

/* ---------- Session (same shape/contract as the rest of the app) ---------- */
const Session = {
  _key: 'bo_session',
  get() {
    try {
      const raw = localStorage.getItem(this._key);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !s.token || !s.exp || Date.now() > s.exp) { this.clear(); return null; }
      return s;
    } catch (e) { return null; }
  },
  set(s) { try { localStorage.setItem(this._key, JSON.stringify(s)); } catch (e) {} },
  clear() { try { localStorage.removeItem(this._key); } catch (e) {} },
  logout() { this.clear(); render(); }
};

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(message, type) {
  type = type || 'info';
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(function () { toast.classList.add('show'); });
  setTimeout(function () {
    toast.classList.remove('show');
    setTimeout(function () { toast.remove(); }, 300);
  }, 3200);
}

/* ---------- API layer ---------- */
const Api = {
  async _post(body) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');
    return json.data;
  },
  checkEmail(email) { return this._post({ action: 'checkEmail', email: email }); },
  setupAccount(email, pin) { return this._post({ action: 'setupAccount', email: email, pin: pin }); },
  login(email, pin) { return this._post({ action: 'login', email: email, pin: pin }); },
  inviteUser(email, role, token) { return this._post({ action: 'inviteUser', email: email, role: role, token: token }); },
  listUsers(token) { return this._post({ action: 'listUsers', token: token }); },
  removeUser(email, token) { return this._post({ action: 'removeUser', email: email, token: token }); }
};

/* ---------- Views ---------- */

function getRedirectTarget() {
  const p = new URLSearchParams(window.location.search).get('redirect');
  return p ? p : 'index.html';
}

function render() {
  const session = Session.get();
  if (session) {
    session.role === 'admin' ? renderAdminHome(session) : renderLoggedInHome(session);
  } else {
    renderEmailStep();
  }
}

function renderLoggedInHome(session) {
  document.getElementById('authCard').innerHTML =
    '<h2>Welcome back</h2>' +
    '<p class="sub">Signed in as <strong>' + escapeHtml(session.email) + '</strong> (Team member)</p>' +
    '<div class="row-gap">' +
    '  <a class="btn" href="' + escapeHtml(getRedirectTarget()) + '" style="text-align:center;text-decoration:none;line-height:1.4;">Continue to Dashboard</a>' +
    '</div>' +
    '<hr class="divider">' +
    '<button class="btn btn-outline" id="logoutBtn">Log Out</button>';
  document.getElementById('logoutBtn').addEventListener('click', function () { Session.logout(); });
}

function renderEmailStep(prefillEmail, message) {
  document.getElementById('authCard').innerHTML =
    (message ? '<div class="msg msg-error">' + escapeHtml(message) + '</div>' : '') +
    '<h2>Log In</h2>' +
    '<p class="sub">Enter your Gmail address to continue.</p>' +
    '<form id="emailForm">' +
    '  <div class="field">' +
    '    <label for="emailInput">Email address</label>' +
    '    <input type="email" id="emailInput" placeholder="you@gmail.com" required value="' + escapeHtml(prefillEmail || '') + '">' +
    '  </div>' +
    '  <button class="btn" type="submit" id="continueBtn">Continue</button>' +
    '</form>' +
    '<p class="sub" style="margin-top:16px;margin-bottom:0;">Access is by invitation only. Ask your admin to add your email if you don\u2019t have an account yet.</p>';

  document.getElementById('emailForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value.trim().toLowerCase();
    const btn = document.getElementById('continueBtn');
    btn.disabled = true;
    btn.textContent = 'Checking\u2026';
    try {
      const status = await Api.checkEmail(email);
      if (status.status === 'not_invited') {
        renderEmailStep(email, 'No account found for this email. Ask an admin to add you first.');
      } else if (status.status === 'invited') {
        renderSetupPin(email);
      } else {
        renderEnterPin(email);
      }
    } catch (err) {
      renderEmailStep(email, err.message);
    }
  });
}

function renderSetupPin(email) {
  document.getElementById('authCard').innerHTML =
    '<a class="back-link" id="backLink">&larr; Back</a>' +
    '<h2>Set up your PIN</h2>' +
    '<p class="sub">First time signing in as <strong>' + escapeHtml(email) + '</strong>. Choose a 4\u20136 digit PIN \u2014 you\u2019ll use it to log in from now on.</p>' +
    '<form id="setupForm">' +
    '  <div class="field">' +
    '    <label for="pin1">New PIN</label>' +
    '    <input type="password" inputmode="numeric" id="pin1" minlength="4" maxlength="6" placeholder="4\u20136 digits" required>' +
    '  </div>' +
    '  <div class="field">' +
    '    <label for="pin2">Confirm PIN</label>' +
    '    <input type="password" inputmode="numeric" id="pin2" minlength="4" maxlength="6" placeholder="Re-enter PIN" required>' +
    '  </div>' +
    '  <button class="btn" type="submit" id="setupBtn">Set PIN & Log In</button>' +
    '</form>';

  document.getElementById('backLink').addEventListener('click', function () { renderEmailStep(email); });
  document.getElementById('setupForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const pin1 = document.getElementById('pin1').value.trim();
    const pin2 = document.getElementById('pin2').value.trim();
    if (!/^\d{4,6}$/.test(pin1)) { showToast('PIN must be 4\u20136 digits.', 'error'); return; }
    if (pin1 !== pin2) { showToast('PINs don\u2019t match.', 'error'); return; }
    const btn = document.getElementById('setupBtn');
    btn.disabled = true;
    btn.textContent = 'Saving\u2026';
    try {
      const data = await Api.setupAccount(email, pin1);
      Session.set(data);
      showToast('Account ready \u2014 you\u2019re logged in.', 'success');
      setTimeout(function () { window.location.href = getRedirectTarget(); }, 500);
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Set PIN & Log In';
    }
  });
}

function renderEnterPin(email) {
  document.getElementById('authCard').innerHTML =
    '<a class="back-link" id="backLink">&larr; Back</a>' +
    '<h2>Enter your PIN</h2>' +
    '<p class="sub">Logging in as <strong>' + escapeHtml(email) + '</strong></p>' +
    '<form id="pinForm">' +
    '  <div class="field">' +
    '    <label for="pinInput">PIN</label>' +
    '    <input type="password" inputmode="numeric" id="pinInput" minlength="4" maxlength="6" placeholder="Enter your PIN" required autofocus>' +
    '  </div>' +
    '  <button class="btn" type="submit" id="loginBtn">Log In</button>' +
    '</form>' +
    '<p class="sub" style="margin-top:16px;margin-bottom:0;">Forgot your PIN? Ask an admin to remove and re-add your email so you can set a new one.</p>';

  document.getElementById('backLink').addEventListener('click', function () { renderEmailStep(email); });
  document.getElementById('pinForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const pin = document.getElementById('pinInput').value.trim();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Logging in\u2026';
    try {
      const data = await Api.login(email, pin);
      Session.set(data);
      showToast('Welcome back!', 'success');
      setTimeout(function () { window.location.href = getRedirectTarget(); }, 400);
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  });
}

/* ---------- Admin: team management ---------- */

function renderAdminHome(session) {
  document.getElementById('authCard').innerHTML =
    '<h2>Team Access</h2>' +
    '<p class="sub">Signed in as <strong>' + escapeHtml(session.email) + '</strong> (Admin)</p>' +
    '<div class="field">' +
    '  <label for="inviteEmail">Add a team member by email</label>' +
    '  <input type="email" id="inviteEmail" placeholder="teammate@gmail.com">' +
    '</div>' +
    '<div class="field">' +
    '  <label for="inviteRole">Access level</label>' +
    '  <select id="inviteRole" style="width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:8px;font-size:14.5px;">' +
    '    <option value="staff">Team member \u2014 view, add customers only</option>' +
    '    <option value="admin">Admin \u2014 full access incl. edit &amp; delete</option>' +
    '  </select>' +
    '</div>' +
    '<button class="btn" id="inviteBtn">Add Person</button>' +
    '<hr class="divider">' +
    '<h3 style="font-size:14px;margin-bottom:10px;">People with access</h3>' +
    '<div id="userList"><p class="sub">Loading\u2026</p></div>' +
    '<hr class="divider">' +
    '<div class="row-gap">' +
    '  <a class="btn btn-outline" href="' + escapeHtml(getRedirectTarget()) + '" style="text-align:center;text-decoration:none;line-height:1.2;">Back to Dashboard</a>' +
    '  <button class="btn btn-outline" id="logoutBtn">Log Out</button>' +
    '</div>';

  document.getElementById('logoutBtn').addEventListener('click', function () { Session.logout(); });

  document.getElementById('inviteBtn').addEventListener('click', async function () {
    const emailEl = document.getElementById('inviteEmail');
    const email = emailEl.value.trim().toLowerCase();
    const role = document.getElementById('inviteRole').value;
    if (!email) { showToast('Enter an email address.', 'error'); return; }
    const btn = this;
    btn.disabled = true;
    try {
      await Api.inviteUser(email, role, session.token);
      emailEl.value = '';
      showToast(email + ' can now log in.', 'success');
      loadUsers(session);
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  });

  loadUsers(session);
}

async function loadUsers(session) {
  const listEl = document.getElementById('userList');
  try {
    const users = await Api.listUsers(session.token);
    if (!users.length) {
      listEl.innerHTML = '<p class="sub">No one added yet.</p>';
      return;
    }
    listEl.innerHTML = users.map(function (u) {
      const isSelf = u.email.toLowerCase() === session.email.toLowerCase();
      return '<div class="user-row">' +
        '<div>' + escapeHtml(u.email) +
        '<span class="role-tag' + (u.role === 'admin' ? ' admin' : '') + '">' + (u.role === 'admin' ? 'Admin' : 'Team member') + '</span>' +
        (u.status === 'invited' ? '<div class="status-tag">Invited \u2014 hasn\u2019t logged in yet</div>' : '') +
        '</div>' +
        (isSelf ? '<span class="status-tag">You</span>' : '<button type="button" class="btn btn-danger btn-sm" data-remove-user="' + escapeHtml(u.email) + '">Remove</button>') +
        '</div>';
    }).join('');

    listEl.querySelectorAll('[data-remove-user]').forEach(function (btn) {
      btn.addEventListener('click', async function () {
        const email = btn.getAttribute('data-remove-user');
        if (!confirm('Remove access for ' + email + '?')) return;
        btn.disabled = true;
        try {
          await Api.removeUser(email, session.token);
          showToast('Removed ' + email + '.', 'success');
          loadUsers(session);
        } catch (err) {
          showToast(err.message, 'error');
          btn.disabled = false;
        }
      });
    });
  } catch (err) {
    listEl.innerHTML = '<p class="sub" style="color:var(--danger-dark)">Could not load the team list: ' + escapeHtml(err.message) + '</p>';
  }
}

render();
</script>
</body>
</html>
