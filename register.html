<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Customer · Bark Ornament CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">
<style>
/* ============================================================
   Bark Ornament — Customer Management System
   Design tokens
   ============================================================ */
:root {
  --ink: #0F2A47;          /* deep navy — sidebar / primary dark */
  --ink-light: #1B3A5C;    /* lighter navy for gradients/hover */
  --steel: #2E6096;        /* steel blue — links, secondary */
  --steel-dark: #1F4670;   /* steel blue hover/active state */
  --accent: #2E6096;       /* primary accent = steel blue (kept as alias for compatibility) */
  --accent-dark: #1F4670;
  --canvas: #F4F6F9;       /* page background */
  --card: #FFFFFF;
  --text: #1F2937;
  --muted: #6B7280;
  --border: #E3E7ED;
  --danger: #EF4444;
  --danger-dark: #C0392B;
  --success: #10B981;
  --radius: 10px;
  --shadow: 0 1px 2px rgba(20, 33, 61, 0.06), 0 4px 16px rgba(20, 33, 61, 0.06);
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-head: 'Sora', 'Inter', sans-serif;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--canvas);
  color: var(--text);
  font-size: 14.5px;
  line-height: 1.5;
}
h1, h2, h3, h4 { font-family: var(--font-head); margin: 0; color: var(--ink); }
a { color: var(--steel); text-decoration: none; }
button, input, select, textarea { font-family: inherit; font-size: inherit; }

/* ---------- App shell ---------- */
#app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px;
  background: var(--ink);
  color: #E7EBF3;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.brand-mark {
  width: 42px; height: 42px;
  border-radius: 50%;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
}
.brand-mark img { width: 100%; height: 100%; object-fit: cover; display: block; }
.brand-name { font-family: var(--font-head); font-weight: 600; font-size: 15px; color: #fff; }
.brand-sub { font-size: 11.5px; color: #9BA9C4; margin-top: 2px; }

.nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-link {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  color: #C4CDE0;
  font-size: 14px;
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
}
.nav-link:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-link.active { background: var(--steel); color: #fff; font-weight: 600; }
.nav-icon { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-footer {
  padding: 16px 20px 22px;
  font-size: 11px;
  color: #7C8AA8;
  border-top: 1px solid rgba(255,255,255,0.08);
  line-height: 1.5;
}
.session-info {
  font-size: 12px;
  color: #C7D0E0;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.session-info strong { color: #fff; font-weight: 600; word-break: break-all; }
.session-info a { color: #8FB6E0; }
.session-info a:hover { color: #fff; }

.mobile-topbar {
  display: none;
  align-items: center;
  gap: 12px;
  background: var(--ink);
  color: #fff;
  padding: 14px 16px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.menu-toggle { background: none; border: none; color: #fff; padding: 4px; cursor: pointer; }
.menu-toggle svg { width: 22px; height: 22px; }

.main {
  flex: 1;
  padding: 32px 36px;
  max-width: 1400px;
  width: 100%;
}

/* ---------- Page header ---------- */
.page-header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
.page-header h1 { font-size: 24px; }
.page-header p { color: var(--muted); margin: 6px 0 0; font-size: 13.5px; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  border-radius: 8px;
  border: 1px solid transparent;
  font-weight: 600;
  font-size: 13.5px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s, background 0.15s;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: #1d2f52; }
.btn-accent { background: var(--steel); color: #fff; }
.btn-accent:hover { background: var(--steel-dark); color: #fff; }
.btn-outline { background: #fff; color: var(--ink); border-color: var(--border); }
.btn-outline:hover { border-color: var(--steel); color: var(--steel); }
.btn-danger { background: #FDECEC; color: var(--danger-dark); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12.5px; }
.btn svg { width: 15px; height: 15px; }
.btn:disabled { opacity: 0.55; cursor: not-allowed; }

/* ---------- Cards ---------- */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 22px;
}

/* ---------- Dashboard stat grid ---------- */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 24px; }
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px 22px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.stat-card .stat-label { font-size: 12.5px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
.stat-card .stat-value { font-family: var(--font-head); font-size: 26px; font-weight: 700; color: var(--ink); margin-top: 8px; }
.stat-card .stat-accent { position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--steel); }

.dash-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
@media (max-width: 1080px) { .dash-grid { grid-template-columns: 1fr; } }

/* ---------- Pipeline funnel (signature element) ---------- */
.funnel { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
.funnel-row { display: grid; grid-template-columns: 130px 1fr 40px; align-items: center; gap: 12px; }
.funnel-label { font-size: 12.5px; font-weight: 600; color: var(--text); }
.funnel-track { height: 10px; background: var(--canvas); border-radius: 6px; overflow: hidden; }
.funnel-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
.funnel-count { font-size: 12.5px; font-weight: 700; color: var(--muted); text-align: right; }

/* ---------- Country summary list ---------- */
.country-list { display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto; }
.country-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 4px; border-bottom: 1px solid var(--border); font-size: 13.5px; }
.country-row:last-child { border-bottom: none; }
.country-count { background: var(--canvas); color: var(--ink); font-weight: 700; padding: 2px 10px; border-radius: 20px; font-size: 12px; }

/* ---------- Forms ---------- */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 20px; }
@media (max-width: 720px) { .form-grid { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: 1 / -1; }
.field label { font-size: 12.5px; font-weight: 600; color: var(--text); }
.field .hint { font-size: 11.5px; color: var(--muted); }
.field input, .field select {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus, .field select:focus {
  border-color: var(--steel);
  box-shadow: 0 0 0 3px rgba(58, 90, 140, 0.15);
}
.field input.invalid, .field select.invalid { border-color: var(--danger); }
.field .error-msg { font-size: 11.5px; color: var(--danger); min-height: 14px; }
.form-actions { display: flex; gap: 12px; margin-top: 22px; justify-content: flex-end; }

/* ---------- Table ---------- */
.table-toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
.search-box { position: relative; flex: 1; min-width: 220px; }
.search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); }
.search-box input { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid var(--border); border-radius: 8px; }
.table-toolbar select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; background: #fff; }

.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: #fff; }
table.data-table { width: 100%; border-collapse: collapse; font-size: 13.3px; min-width: 900px; }
table.data-table thead th {
  text-align: left;
  background: var(--canvas);
  color: var(--muted);
  font-weight: 700;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.data-table tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.data-table tbody tr:last-child td { border-bottom: none; }
table.data-table tbody tr:hover { background: #FAFBFD; }
.row-actions { display: flex; gap: 6px; }
.empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-state svg { width: 40px; height: 40px; margin-bottom: 12px; color: var(--border); }

/* ---------- Status badge ---------- */
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: color-mix(in srgb, var(--badge-color) 14%, white);
  color: var(--badge-color);
  white-space: nowrap;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--badge-color); }

/* ---------- Toasts ---------- */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
.toast {
  background: var(--ink); color: #fff;
  padding: 12px 18px; border-radius: 8px;
  font-size: 13.5px; font-weight: 500;
  box-shadow: var(--shadow);
  opacity: 0; transform: translateY(-8px);
  transition: opacity 0.25s, transform 0.25s;
  max-width: 320px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-success { background: #0F5D46; }
.toast-error { background: var(--danger-dark); }

/* ---------- Modal (delete confirm) ---------- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(20, 33, 61, 0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 150; padding: 20px;
}
.modal { background: #fff; border-radius: var(--radius); padding: 26px; max-width: 400px; width: 100%; box-shadow: var(--shadow); }
.modal h3 { font-size: 17px; margin-bottom: 8px; }
.modal p { color: var(--muted); font-size: 13.5px; margin: 0 0 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ---------- Loading ---------- */
.loading-row { text-align: center; padding: 40px; color: var(--muted); }
.spinner {
  width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--steel);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- Responsive ---------- */
@media (max-width: 900px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .sidebar {
    position: fixed; left: 0; top: 0; height: 100vh; z-index: 30;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-topbar { display: flex; }
  .main { padding: 20px; }
}
@media (max-width: 560px) {
  .stat-grid { grid-template-columns: 1fr; }
}

/* ---------- Print (customer detail) ---------- */
@media print {
  .no-print { display: none !important; }
  body { background: #fff; }
}

</style>
</head>
<body>

<div id="app-shell"></div>

<script>
/**
 * Paste your deployed Google Apps Script Web App URL below.
 * Deploy > New deployment > Web app > Execute as: Me > Who has access: Anyone
 * The URL ends with /exec
 */
const API_URL = 'https://script.google.com/macros/s/AKfycbxFb-wqcSjnSsP_jPqv_6B1FG912MRO7G2keSJCSgGB6_-n4kQ3SU7OPBpGM7gqr1g/exec';

const COMPANY = {
  name: 'Bark Ornament Private Limited',
  address: 'No. 59A Bekkegama, Panadura'
};

const STATUS_OPTIONS = [
  'New Lead',
  'Existing Customer'
];

// Order reflects the sales pipeline, used for the funnel visual on the dashboard.
const STATUS_PIPELINE_ORDER = [
  'New Lead',
  'Existing Customer'
];

const STATUS_COLORS = {
  'New Lead': '#94A3B8',
  'Existing Customer': '#10B981'
};

// How this customer/lead first came in. "Other" reveals a free-text box
// so anything not on the list can still be captured.
const SOURCE_OPTIONS = [
  'WhatsApp',
  'Facebook',
  'Instagram',
  'Email',
  'Phone Call',
  'Website',
  'Referral',
  'Walk-in',
  'Other'
];

/* ---------- Country / currency / serial-prefix configuration ----------
   Each country has a serial-number prefix (e.g. MAL-0001) and a currency.
   Defaults cover the current business segments; more can be added from
   the Add Customer form ("+ Add New Country").
   Custom countries are synced through the Apps Script "Countries" sheet
   (doGet ?action=countries, doPost addCountry/deleteCountry) so a country
   added on one browser/device shows up on every other one. localStorage
   is kept only as an offline fallback cache in case the backend can't be
   reached — it is never the source of truth. */

const DEFAULT_COUNTRIES = [
  { name: 'Seychelles', prefix: 'SEY', currency: 'USD' }
];

const CountryConfig = {
  _cacheKey: 'bo_custom_countries', // offline fallback only
  _remote: null,       // last-known list fetched from the backend
  _readyPromise: null,

  /** Fetches the shared list from the backend; call once at startup (via ensureLoaded). */
  async refresh() {
    try {
      const remote = await Api.getCountries();
      this._remote = remote;
      try { localStorage.setItem(this._cacheKey, JSON.stringify(remote)); } catch (e) { /* ignore quota errors */ }
    } catch (err) {
      // Backend unreachable — fall back to whatever we last saw on this browser.
      if (this._remote === null) {
        try {
          const raw = localStorage.getItem(this._cacheKey);
          this._remote = raw ? JSON.parse(raw) : [];
        } catch (e) { this._remote = []; }
      }
      showToast('Could not sync countries from server — using last known list.', 'error');
    }
    return this.getAll();
  },

  /** Ensures the list has been loaded at least once; safe to call repeatedly. */
  ensureLoaded() {
    if (!this._readyPromise) this._readyPromise = this.refresh();
    return this._readyPromise;
  },

  _customList() {
    return this._remote || [];
  },
  getAll() {
    const map = {};
    DEFAULT_COUNTRIES.forEach(function (c) { map[c.name.toLowerCase()] = c; });
    this._customList().forEach(function (c) { map[c.name.toLowerCase()] = c; });
    return Object.values(map).sort(function (a, b) { return a.name.localeCompare(b.name); });
  },
  find(name) {
    const key = String(name || '').toLowerCase();
    return this.getAll().find(function (c) { return c.name.toLowerCase() === key; });
  },
  async add(entry) {
    const name = (entry.name || '').trim();
    const prefix = (entry.prefix || '').trim().toUpperCase();
    const currency = (entry.currency || '').trim().toUpperCase();
    if (!name || !prefix || !currency) throw new Error('Country name, serial prefix, and currency are all required.');
    if (!/^[A-Z]{2,5}$/.test(prefix)) throw new Error('Prefix should be 2-5 letters, e.g. MAL, SEY, MAU.');
    if (!/^[A-Z]{3}$/.test(currency)) throw new Error('Currency should be a 3-letter code, e.g. USD, LKR.');
    const existing = this.getAll();
    if (existing.some(function (c) { return c.name.toLowerCase() === name.toLowerCase(); })) throw new Error('That country already exists.');
    if (existing.some(function (c) { return c.prefix.toLowerCase() === prefix.toLowerCase(); })) throw new Error('That serial prefix is already in use — pick a different one.');
    const record = { name: name, prefix: prefix, currency: currency };
    await Api.addCountry(record); // writes to the shared Countries sheet
    await this.refresh();
    return record;
  },
  async remove(name) {
    const key = String(name || '').toLowerCase();
    if (DEFAULT_COUNTRIES.some(function (c) { return c.name.toLowerCase() === key; })) {
      throw new Error('The built-in country (Seychelles) can\u2019t be removed.');
    }
    const existing = this._customList();
    const match = existing.find(function (c) { return c.name.toLowerCase() === key; });
    if (!match) throw new Error('That country was not found — it may have already been removed.');
    await Api.deleteCountry(match.name); // removes from the shared Countries sheet
    await this.refresh();
  }
};

/* ---------- Responsible-person (staff) configuration ----------
   Simple team-member list used for the "Responsible Person" dropdown.
   Synced through the Apps Script "Staff" sheet (doGet ?action=staff,
   doPost addStaff/deleteStaff) so a name added on one browser/device
   shows up on every other one. localStorage is kept only as an offline
   fallback cache — it is never the source of truth. */

const StaffConfig = {
  _cacheKey: 'bo_staff_list', // offline fallback only
  _remote: null,
  _readyPromise: null,

  async refresh() {
    try {
      const remote = await Api.getStaff();
      this._remote = remote;
      try { localStorage.setItem(this._cacheKey, JSON.stringify(remote)); } catch (e) { /* ignore quota errors */ }
    } catch (err) {
      if (this._remote === null) {
        try {
          const raw = localStorage.getItem(this._cacheKey);
          this._remote = raw ? JSON.parse(raw) : [];
        } catch (e) { this._remote = []; }
      }
      showToast('Could not sync team members from server — using last known list.', 'error');
    }
    return this.getAll();
  },

  ensureLoaded() {
    if (!this._readyPromise) this._readyPromise = this.refresh();
    return this._readyPromise;
  },

  getAll() {
    return (this._remote || []).slice().sort(function (a, b) { return a.localeCompare(b); });
  },
  async add(name) {
    name = (name || '').trim();
    if (!name) throw new Error('Please enter a name.');
    const existing = this.getAll();
    if (existing.some(function (n) { return n.toLowerCase() === name.toLowerCase(); })) {
      throw new Error('That person is already on the list.');
    }
    await Api.addStaff(name); // writes to the shared Staff sheet
    await this.refresh();
    return name;
  },
  async remove(name) {
    const key = String(name || '').toLowerCase();
    const existing = this.getAll();
    const match = existing.find(function (n) { return n.toLowerCase() === key; });
    if (!match) throw new Error('That person was not found — they may have already been removed.');
    await Api.deleteStaff(match); // removes from the shared Staff sheet
    await this.refresh();
  }
};

// Given the current customer list and a country's prefix, work out the next
// serial number in sequence, e.g. existing MAL-0001, MAL-0002 -> MAL-0003.
function nextSerialNo(customers, prefix) {
  let max = 0;
  (customers || []).forEach(function (c) {
    if (c.serialNo && c.serialNo.indexOf(prefix + '-') === 0) {
      const n = parseInt(c.serialNo.slice(prefix.length + 1), 10);
      if (!isNaN(n) && n > max) max = n;
    }
  });
  return prefix + '-' + String(max + 1).padStart(4, '0');
}


/* ============================================================

   ============================================================ */

/* ---------- Navigation shell ---------- */

function renderShell(activePage) {
  const session = Session.get();
  const isAdmin = !!session && session.role === 'admin';

  const nav = [
    { key: 'dashboard', label: 'Dashboard', href: 'index.html', icon: 'grid' },
    { key: 'register', label: 'Add Customer', href: 'register.html', icon: 'plus' },
    { key: 'customers', label: 'Customers', href: 'customers.html', icon: 'list' },
    { key: 'quotations', label: 'Quotations', href: 'quotations.html', icon: 'quote' },
    { key: 'invoices', label: 'Invoices', href: 'invoices.html', icon: 'invoice' },
    { key: 'pos', label: 'Purchase Orders', href: 'pos.html', icon: 'po' }
  ];
  if (isAdmin) {
    nav.push({ key: 'team', label: 'Team Access', href: 'login.html', icon: 'team' });
  }

  const icons = {
    grid: '<path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>',
    plus: '<path d="M12 5v14M5 12h14"/>',
    list: '<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
    quote: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 15h6M9 11h3"/>',
    invoice: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 17h6M9 13h6"/>',
    po: '<path d="M9 14l2 2 4-4"/><path d="M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9c2.06 0 3.96.7 5.47 1.86"/><path d="M16 4l2 2-2 2"/>',

/* ---------- Toast notifications ---------- */

function showToast(message, type) {
  type = type || 'info';
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(function () { toast.classList.add('show'); });
  setTimeout(function () {
    toast.classList.remove('show');
    setTimeout(function () { toast.remove(); }, 300);
  }, 3200);
}

/* ---------- Session / auth ----------
   Login is required to use this app. A logged-in session (email, role,
   signed token, expiry) is cached in localStorage so people stay signed
   in across visits until the token expires (server-side, default 12h)
   or they log out. The role check here only controls what UI is shown —
   the real security boundary is the token check the backend does on
   every add/update/delete request. */
const Session = {
  _key: 'bo_session',
  get() {
    try {
      const raw = localStorage.getItem(this._key);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !s.token || !s.exp || Date.now() > s.exp) { this.clear(); return null; }
      return s;
    } catch (e) { return null; }
  },
  set(s) { try { localStorage.setItem(this._key, JSON.stringify(s)); } catch (e) { /* ignore */ } },
  clear() { try { localStorage.removeItem(this._key); } catch (e) { /* ignore */ } },
  isAdmin() { const s = this.get(); return !!s && s.role === 'admin'; },
  /** Redirects to login.html if there's no valid session; returns the session otherwise. */
  requireLogin() {
    const s = this.get();
    if (!s) {
      const here = encodeURIComponent(location.pathname.split('/').pop() + location.search);
      window.location.href = 'login.html?redirect=' + here;
      return null;
    }
    return s;
  },
  logout() {
    this.clear();
    window.location.href = 'login.html';
  }
};

/* ---------- API layer ---------- */

const Api = {
  async getCustomers() {
    return this._get('');
  },

  async addCustomer(data) {
    return this._post({ action: 'add', data: data });
  },

  async updateCustomer(data) {
    return this._post({ action: 'update', data: data });
  },

  async deleteCustomer(serialNo) {
    return this._post({ action: 'delete', serialNo: serialNo });
  },

  async getCountries() {
    return this._get('&action=countries');
  },

  async addCountry(data) {
    return this._post({ action: 'addCountry', data: data });
  },

  async deleteCountry(name) {
    return this._post({ action: 'deleteCountry', name: name });
  },

  async getStaff() {
    return this._get('&action=staff');
  },

  async addStaff(name) {
    return this._post({ action: 'addStaff', data: { name: name } });
  },

  async deleteStaff(name) {
    return this._post({ action: 'deleteStaff', name: name });
  },

  async _get(suffix) {
    if (!API_URL || API_URL.indexOf('PASTE_YOUR') === 0) {
      throw new Error('API_URL is not configured. Edit js/config.js with your Apps Script deployment URL.');
    }
    const s = Session.get();
    const res = await fetch(API_URL + '?token=' + encodeURIComponent(s ? s.token : '') + suffix, { method: 'GET' });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || 'Request failed'); }
    return json.data;
  },

  async _post(body) {
    const s = Session.get();
    body.token = s ? s.token : '';
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.success) { handleAuthError(json.error); throw new Error(json.error || 'Request failed'); }
    return json.data;
  }
};

/** If the backend rejected a call because the session is invalid/expired,
 *  clear it and send the person back to login instead of just erroring. */
function handleAuthError(errorCode) {
  if (errorCode === 'AUTH_REQUIRED') {
    Session.clear();
    showToast('Your session has expired — please log in again.', 'error');
    setTimeout(function () { window.location.href = 'login.html'; }, 1200);
  }
}

/* ---------- Formatting helpers ---------- */

function formatCurrency(value, currency) {
  const num = Number(value) || 0;
  return (currency || 'USD') + ' ' + num.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function formatDate(value) {
  if (!value) return '—';
  const d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function statusBadge(status) {
  const color = STATUS_COLORS[status] || '#9CA3AF';
  return '<span class="status-badge" style="--badge-color:' + color + '">' +
    '<span class="status-dot"></span>' + status + '</span>';
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ---------- Simple client-side cache shared across pages in one session ---------- */

const CustomerStore = {
  _data: null,
  async load(force) {
    if (this._data && !force) return this._data;
    this._data = await Api.getCustomers();
    return this._data;
  },
  invalidate() { this._data = null; }
};

document.getElementById('cancelNewStaff').addEventListener('click', function () {
  document.getElementById('newStaffPanel').style.display = 'none';
  document.getElementById('responsiblePerson').value = '';
});

document.getElementById('saveNewStaff').addEventListener('click', async function () {
  const btn = document.getElementById('saveNewStaff');
  btn.disabled = true;
  try {
    const name = await StaffConfig.add(document.getElementById('newStaffName').value);
    populateStaffSelect(name);
    document.getElementById('newStaffPanel').style.display = 'none';
    document.getElementById('newStaffName').value = '';
    showToast('Added ' + name + ' to the team list for everyone.', 'success');
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
  }
});

StaffConfig.ensureLoaded().then(function () { populateStaffSelect(); });

function openManageStaffModal() {
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'manageStaffModal';

  function rowsHtml() {
    const staff = StaffConfig.getAll();
    if (staff.length === 0) return '<p style="color:var(--muted);font-size:13.5px;">No team members added yet.</p>';
    return staff.map(function (n) {
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-bottom:1px solid var(--border);font-size:13.5px;">' +
        '<div><strong>' + escapeHtml(n) + '</strong></div>' +
        (currentSession.role === 'admin'
          ? '<button type="button" class="btn btn-danger btn-sm" data-remove-staff="' + escapeHtml(n) + '">Remove</button>'
          : '<span style="font-size:11.5px;color:var(--muted);">Admin only</span>') +
        '</div>';
    }).join('');
  }

  backdrop.innerHTML =
    '<div class="modal" style="max-width:420px;">' +
    '  <h3>Manage Team Members</h3>' +
    '  <p>Removing someone here only affects the dropdown for new selections — customers already assigned to them keep that record.</p>' +
    '  <div id="manageStaffList" style="max-height:320px;overflow-y:auto;margin-bottom:18px;">' + rowsHtml() + '</div>' +
    '  <div class="modal-actions"><button type="button" class="btn btn-outline" id="closeManageStaff">Close</button></div>' +
    '</div>';
  document.body.appendChild(backdrop);

  function attachRemoveHandlers() {
    backdrop.querySelectorAll('[data-remove-staff]').forEach(function (btn) {
      btn.addEventListener('click', async function () {
        const name = btn.getAttribute('data-remove-staff');
        if (!confirm('Remove "' + name + '" from the team list?')) return;
        btn.disabled = true;
        try {
          await StaffConfig.remove(name);
          document.getElementById('manageStaffList').innerHTML = rowsHtml();
          attachRemoveHandlers();
          populateStaffSelect();
          showToast('Removed ' + name + ' for everyone.', 'success');
        } catch (err) {
          showToast(err.message, 'error');
          btn.disabled = false;
        }
      });
    });
  }
  attachRemoveHandlers();

  backdrop.addEventListener('click', function (e) { if (e.target === backdrop) backdrop.remove(); });
  document.getElementById('closeManageStaff').addEventListener('click', function () { backdrop.remove(); });
}

document.getElementById('manageStaffBtn').addEventListener('click', openManageStaffModal);

const fields = ['companyName', 'customerName', 'contactPerson', 'contactPersonPosition', 'contactPerson2Name', 'contactPerson2No', 'contactPerson2Position', 'country', 'nationality', 'industry', 'status', 'email', 'source', 'sourceOther', 'expectedSalesVolumeMonthly', 'expectedSalesVolume', 'currentSalesVolume', 'responsiblePerson', 'notes'];
const required = ['companyName', 'country'];

function clearErrors() {
  fields.forEach(function (f) {
    document.getElementById(f).classList.remove('invalid');
    const msg = document.querySelector('.error-msg[data-for="' + f + '"]');
    if (msg) msg.textContent = '';
  });
}

function setError(field, message) {
  document.getElementById(field).classList.add('invalid');
  const msg = document.querySelector('.error-msg[data-for="' + field + '"]');
  if (msg) msg.textContent = message;
}

function validate() {
  clearErrors();
  let valid = true;

  required.forEach(function (f) {
    const val = document.getElementById(f).value.trim();
    if (!val || (f === 'country' && val === '__add_new__')) {
      setError(f, f === 'country' ? 'Please select a country, or add one first.' : 'This field is required.');
      valid = false;
    }
  });

  const email = document.getElementById('email').value.trim();
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    setError('email', 'Enter a valid email address.');
    valid = false;
  }

  const phone = document.getElementById('contactPerson').value.trim();
  if (phone && !/^[+\d][\d\s\-()]{5,}$/.test(phone)) {
    setError('contactPerson', 'Enter a valid contact number.');
    valid = false;
  }

  const phone2 = document.getElementById('contactPerson2No').value.trim();
  if (phone2 && !/^[+\d][\d\s\-()]{5,}$/.test(phone2)) {
    setError('contactPerson2No', 'Enter a valid contact number.');
    valid = false;
  }

  ['expectedSalesVolumeMonthly', 'expectedSalesVolume', 'currentSalesVolume'].forEach(function (f) {
    const val = document.getElementById(f).value;
    if (val !== '' && Number(val) < 0) {
      setError(f, 'Must be zero or greater.');
      valid = false;
    }
  });

  return valid;
}

async function prefillIfEditing() {
  if (!isEdit) return;
  try {
    await CountryConfig.ensureLoaded();
    await StaffConfig.ensureLoaded();
    const customers = await CustomerStore.load();
    const record = customers.find(c => c.serialNo === editSerial);
    if (!record) {
      showToast('Customer not found for editing.', 'error');
      return;
    }
    document.getElementById('serialNo').value = record.serialNo || '';
    document.getElementById('serialNoHint').textContent = 'Serial numbers don\u2019t change when editing a customer.';
    document.getElementById('companyName').value = record.companyName || '';
    document.getElementById('customerName').value = record.customerName || '';
    document.getElementById('contactPerson').value = record.contactPerson || '';
    document.getElementById('contactPersonPosition').value = record.contactPersonPosition || '';
    document.getElementById('contactPerson2Name').value = record.contactPerson2Name || '';
    document.getElementById('contactPerson2No').value = record.contactPerson2No || '';
    document.getElementById('contactPerson2Position').value = record.contactPerson2Position || '';
    populateCountrySelect(record.country);
    if (record.country && !CountryConfig.find(record.country)) {
      // Legacy or unrecognized country value — keep it selectable so editing doesn't wipe it out.
      const sel = document.getElementById('country');
      sel.insertAdjacentHTML('afterbegin', '<option value="' + escapeHtml(record.country) + '">' + escapeHtml(record.country) + ' (unrecognized)</option>');
      sel.value = record.country;
    }
    updateCountryHint();
    document.getElementById('nationality').value = record.nationality || '';
    document.getElementById('industry').value = record.industry || '';
    document.getElementById('status').value = record.status || 'New Lead';
    document.getElementById('email').value = record.email || '';
    const recordSource = record.source || '';
    if (recordSource && SOURCE_OPTIONS.indexOf(recordSource) !== -1 && recordSource !== 'Other') {
      sourceSelect.value = recordSource;
      document.getElementById('sourceOtherField').style.display = 'none';
    } else if (recordSource) {
      sourceSelect.value = 'Other';
      document.getElementById('sourceOtherField').style.display = 'flex';
      document.getElementById('sourceOther').value = recordSource;
    }
    document.getElementById('expectedSalesVolumeMonthly').value = record.expectedSalesVolumeMonthly || '';
    document.getElementById('expectedSalesVolume').value = record.expectedSalesVolume || '';
    document.getElementById('currentSalesVolume').value = record.currentSalesVolume || '';
    populateStaffSelect(record.responsiblePerson);
    if (record.responsiblePerson && StaffConfig.getAll().indexOf(record.responsiblePerson) === -1) {
      const sel = document.getElementById('responsiblePerson');
      sel.insertAdjacentHTML('afterbegin', '<option value="' + escapeHtml(record.responsiblePerson) + '">' + escapeHtml(record.responsiblePerson) + '</option>');
      sel.value = record.responsiblePerson;
    }
    document.getElementById('notes').value = record.notes || '';
  } catch (err) {
    showToast('Error loading customer: ' + err.message, 'error');
  }
}

/** After a successful ADD (not edit), clears the form so another customer
 *  can be entered right away instead of navigating away to customers.html. */
function resetFormForNextEntry() {
  clearErrors();
  ['companyName', 'customerName', 'contactPerson', 'contactPersonPosition',
    'contactPerson2Name', 'contactPerson2No', 'contactPerson2Position',
    'nationality', 'industry', 'email', 'expectedSalesVolumeMonthly',
    'expectedSalesVolume', 'currentSalesVolume', 'notes'
  ].forEach(function (f) { document.getElementById(f).value = ''; });

  document.getElementById('status').value = 'New Lead';

  const sourceSelectEl = document.getElementById('source');
  sourceSelectEl.value = SOURCE_OPTIONS[0];
  document.getElementById('sourceOtherField').style.display = 'none';
  document.getElementById('sourceOther').value = '';

  populateStaffSelect(); // clears back to "Select…" / no responsible person chosen

  // Country is left as-is (people usually add several customers from the
  // same country/segment in a row) — just refresh the serial-number
  // preview so it reflects the customer that was just saved.
  refreshSerialPreview();

  document.getElementById('companyName').focus();
}

document.getElementById('customerForm').addEventListener('submit', async function (e) {
  e.preventDefault();
  if (!validate()) {
    showToast('Please fix the highlighted fields.', 'error');
    return;
  }

  const countryName = document.getElementById('country').value.trim();
  const countryCfg = CountryConfig.find(countryName);

  const data = {
    companyName: document.getElementById('companyName').value.trim(),
    customerName: document.getElementById('customerName').value.trim(),
    contactPerson: document.getElementById('contactPerson').value.trim(),
    contactPersonPosition: document.getElementById('contactPersonPosition').value.trim(),
    contactPerson2Name: document.getElementById('contactPerson2Name').value.trim(),
    contactPerson2No: document.getElementById('contactPerson2No').value.trim(),
    contactPerson2Position: document.getElementById('contactPerson2Position').value.trim(),
    country: countryName,
    nationality: document.getElementById('nationality').value.trim(),
    industry: document.getElementById('industry').value.trim(),
    status: document.getElementById('status').value,
    email: document.getElementById('email').value.trim(),
    source: document.getElementById('source').value === 'Other'
      ? document.getElementById('sourceOther').value.trim()
      : document.getElementById('source').value,
    currency: countryCfg ? countryCfg.currency : 'USD',
    expectedSalesVolumeMonthly: document.getElementById('expectedSalesVolumeMonthly').value || 0,
    expectedSalesVolume: document.getElementById('expectedSalesVolume').value || 0,
    currentSalesVolume: document.getElementById('currentSalesVolume').value || 0,
    responsiblePerson: document.getElementById('responsiblePerson').value === '__add_new__'
      ? ''
      : document.getElementById('responsiblePerson').value,
    notes: document.getElementById('notes').value.trim()
  };

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Saving…';

  try {
    if (isEdit) {
      data.serialNo = editSerial;
      await Api.updateCustomer(data);
      showToast('Customer updated successfully.', 'success');
      CustomerStore.invalidate();
      setTimeout(function () { window.location.href = 'customers.html'; }, 700);
    } else {
      const existing = await CustomerStore.load();
      data.serialNo = nextSerialNo(existing, countryCfg ? countryCfg.prefix : 'CUS');
      await Api.addCustomer(data);
      showToast('Customer saved. Ready for the next one.', 'success');
      CustomerStore.invalidate();
      resetFormForNextEntry();
      submitBtn.disabled = false;
      submitBtn.textContent = 'Save Customer';
    }
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = isEdit ? 'Save Changes' : 'Save Customer';
  }
});

prefillIfEditing();
</script>
